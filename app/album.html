<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbuns — Kelvn</title>

<script>try{var _t=localStorage.getItem('kelvn_theme');if(_t)document.documentElement.setAttribute('data-theme',_t);}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F4EF;--surface:#FFFFFF;--surface2:#F0EDE6;--surface3:#E8E3DA;
  --border:rgba(0,0,0,0.04);--border-strong:rgba(0,0,0,0.09);
  --text:#1A1814;--text-muted:#6B6660;--text-hint:#B0ABA6;
  --amber:#C4780A;--amber-light:#FDF3E3;--amber-deep:#8A4F00;
  --coral:#C43A1A;--coral-light:#FDF0EC;
  --teal:#0A7864;--teal-light:#E3F4EF;
  --purple:#5255A0;--purple-light:#EEF0FF;
  --radius:8px;--radius-sm:5px;
}
[data-theme="dark"]{
  --bg:#111009;--surface:#1A1814;--surface2:#211E18;--surface3:#2A2620;
  --border:rgba(255,255,255,0.04);--border-strong:rgba(255,255,255,0.07);
  --text:#EDE9E3;--text-muted:#9E9892;--text-hint:#5C5854;
  --amber:#D4902A;--amber-light:#221808;--amber-deep:#C4780A;
  --coral:#CC4A28;--coral-light:#1E0E08;
  --teal:#18926E;--teal-light:#091E15;
  --purple:#8A8DCC;--purple-light:#12142A;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:calc(100vh / 0.9);overflow:hidden;display:flex;zoom:0.9;}

/* ── Sidebar (idêntica à Kelvn) ──────────────────────────────────── */
.snav{width:56px;flex-shrink:0;background:var(--bg);border-right:.5px solid var(--border-strong);display:flex;flex-direction:column;align-items:center;padding:1rem 0;position:fixed;top:0;left:0;height:calc(100vh / 0.9);z-index:100;gap:2px;}
.snav-logo{font-family:'Cherry Bomb One',cursive;font-size:1.6rem;color:var(--amber);margin-bottom:.75rem;padding:.25rem 0;line-height:1;text-decoration:none;}
.snav-sep{width:28px;height:.5px;background:var(--border-strong);margin:.5rem 0;}
.snav-btn{width:38px;height:38px;border-radius:10px;border:none;background:transparent;color:var(--text-hint);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;position:relative;flex-shrink:0;text-decoration:none;}
.snav-btn:hover{background:var(--surface2);color:var(--text-muted);}
.snav-btn.active{background:transparent;color:var(--amber);}
.snav-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:4px;}

/* ── Main ────────────────────────────────────────────────────────── */
#main{flex:1;margin-left:56px;min-width:0;overflow:hidden;display:flex;flex-direction:column;}

/* ── Estado: Lista de álbuns ─────────────────────────────────────── */
#view-lista{flex:1;overflow-y:auto;padding:2rem 2.5rem 4rem;}
.view-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;}
.view-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--text);}
.btn{display:inline-flex;align-items:center;gap:.4rem;background:var(--text);color:var(--bg);border:.5px solid var(--text);border-radius:8px;padding:6px 15px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-sec{background:transparent;color:var(--text-muted);border:.5px solid var(--border-strong);}
.btn-sec:hover{color:var(--text);opacity:1;}
#albuns-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;}
.album-card{background:var(--surface);border:.5px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem;cursor:pointer;transition:border-color .15s;}
.album-card:hover{border-color:var(--border-strong);}
.album-card-nome{font-size:.88rem;font-weight:500;color:var(--text);margin-bottom:.35rem;}
.album-card-sub{font-size:.68rem;color:var(--text-hint);}
.album-card-badge{display:inline-block;font-size:.58rem;padding:2px 8px;border-radius:20px;margin-top:.5rem;}
.badge-rascunho{background:var(--surface2);color:var(--text-hint);}
.badge-finalizado{background:var(--teal-light);color:var(--teal);}
#albuns-empty{padding:4rem 0;text-align:center;color:var(--text-hint);font-size:.85rem;display:none;}

/* ── Estado: Novo álbum ──────────────────────────────────────────── */
#view-novo{flex:1;overflow-y:auto;padding:2rem 2.5rem;}
.form-group{margin-bottom:1.1rem;}
.form-label{font-size:.72rem;color:var(--text-muted);margin-bottom:.4rem;display:block;}
.form-input{width:100%;max-width:440px;padding:8px 12px;background:var(--surface);border:.5px solid var(--border-strong);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--amber);}
.formato-grid{display:flex;gap:.6rem;flex-wrap:wrap;}
.formato-opt{display:flex;flex-direction:column;align-items:center;gap:.4rem;padding:.6rem .8rem;border:.5px solid var(--border-strong);border-radius:8px;cursor:pointer;transition:border-color .15s,background .15s;}
.formato-opt:hover{border-color:var(--border-strong);background:var(--surface2);}
.formato-opt.sel{border-color:var(--amber);background:var(--amber-light);}
.formato-preview{background:var(--surface2);border-radius:3px;}
.formato-label{font-size:.65rem;color:var(--text-hint);}

/* ── Estado: Editor ──────────────────────────────────────────────── */
#view-editor{flex:1;display:flex;overflow:hidden;}

/* Pool esquerdo */
#pool-panel{width:220px;flex-shrink:0;background:var(--surface);border-right:.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#pool-header{padding:.75rem 1rem;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
#pool-titulo{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-hint);}
#pool-count{font-size:.65rem;color:var(--text-hint);}
#pool-grid{flex:1;overflow-y:auto;padding:.5rem;display:grid;grid-template-columns:1fr 1fr;gap:.35rem;}
.pool-foto{aspect-ratio:1;border-radius:5px;overflow:hidden;cursor:grab;position:relative;background:var(--surface2);}
.pool-foto img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
.pool-foto.usada::after{content:'✓';position:absolute;inset:0;background:rgba(10,120,100,.55);display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;pointer-events:none;}
.pool-foto.usada{opacity:.5;}
#pool-empty{padding:2rem 1rem;text-align:center;font-size:.72rem;color:var(--text-hint);display:none;}
#pool-loading{padding:2rem 1rem;text-align:center;font-size:.72rem;color:var(--text-hint);}

/* Área central do canvas */
#canvas-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
#canvas-topbar{padding:.5rem 1rem;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:.75rem;background:var(--surface);}
#album-nome-topbar{font-size:.82rem;font-weight:500;color:var(--text);}
#save-status{font-size:.65rem;color:var(--text-hint);margin-left:auto;}
#canvas-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#konva-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:1.5rem;overflow:hidden;}
#thumbs-bar{height:88px;background:var(--surface);border-top:.5px solid var(--border);display:flex;align-items:center;gap:.5rem;padding:0 1rem;overflow-x:auto;flex-shrink:0;}
.thumb-item{height:64px;flex-shrink:0;border-radius:5px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s;position:relative;background:var(--surface2);}
.thumb-item.ativo{border-color:var(--amber);}
.thumb-item canvas{height:100%;width:auto;display:block;}
.thumb-add{height:64px;width:44px;flex-shrink:0;border:.5px dashed var(--border-strong);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-hint);font-size:1.1rem;transition:color .15s,border-color .15s;}
.thumb-add:hover{color:var(--amber);border-color:var(--amber);}
.thumb-remove{position:absolute;top:2px;right:2px;width:14px;height:14px;background:rgba(196,58,26,.8);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:.55rem;color:#fff;cursor:pointer;line-height:1;}
.thumb-item:hover .thumb-remove{display:flex;}

/* Painel de templates */
#templates-panel{width:188px;flex-shrink:0;background:var(--surface);border-left:.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#tpl-header{padding:.75rem 1rem;border-bottom:.5px solid var(--border);font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-hint);}
#tpl-grid{flex:1;overflow-y:auto;padding:.5rem;display:grid;grid-template-columns:1fr 1fr;gap:.4rem;}
.tpl-card{border:.5px solid var(--border);border-radius:6px;cursor:pointer;padding:.4rem;transition:border-color .15s,background .15s;}
.tpl-card:hover{border-color:var(--border-strong);background:var(--surface2);}
.tpl-card.ativo{border-color:var(--amber);background:var(--amber-light);}
.tpl-preview{width:100%;aspect-ratio:2;background:var(--surface2);border-radius:3px;margin-bottom:.3rem;position:relative;overflow:hidden;}
.tpl-slot{position:absolute;background:var(--surface3);border:.5px solid var(--border-strong);}
.tpl-nome{font-size:.58rem;color:var(--text-hint);text-align:center;}

/* ── Utilitários ─────────────────────────────────────────────────── */
.hidden{display:none!important;}
.drop-over{outline:2px solid var(--amber)!important;outline-offset:-2px;}
#overlay-auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;font-size:.85rem;color:var(--text-hint);}
</style>
</head>

<!-- ── Área principal ── -->
<div id="main">

  <!-- Lista de álbuns -->
  <div id="view-lista" class="hidden">
    <div class="view-header">
      <div class="view-title">Álbuns</div>
      <button class="btn" onclick="irParaNovo()">+ Novo álbum</button>
    </div>
    <div id="albuns-empty">
      <div style="font-size:1.5rem;margin-bottom:.75rem;opacity:.3;">📖</div>
      <div style="margin-bottom:.4rem;">Nenhum álbum ainda.</div>
      <div style="font-size:.75rem;">Crie o primeiro para começar a diagramar.</div>
    </div>
    <div id="albuns-grid"></div>
  </div>

  <!-- Novo álbum -->
  <div id="view-novo" class="hidden">
    <div class="view-header" style="margin-bottom:1.5rem;">
      <div style="display:flex;align-items:center;gap:.75rem;">
        <button class="btn btn-sec" onclick="irParaLista()" style="padding:5px 10px;">← Voltar</button>
        <div class="view-title">Novo álbum</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Nome do álbum</label>
      <input class="form-input" id="novo-nome" placeholder="ex: Álbum Ana & Lucas" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">Galeria vinculada <span style="color:var(--text-hint);font-size:.65rem;">(as fotos favoritadas pelo casal virão desta galeria)</span></label>
      <select class="form-input" id="novo-galeria">
        <option value="">Selecionar galeria…</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Formato</label>
      <div class="formato-grid" id="formato-grid">
        <div class="formato-opt sel" data-formato="paisagem" onclick="selFormato(this)">
          <div class="formato-preview" style="width:64px;height:40px;"></div>
          <div class="formato-label">Paisagem</div>
        </div>
        <div class="formato-opt" data-formato="quadrado" onclick="selFormato(this)">
          <div class="formato-preview" style="width:44px;height:44px;"></div>
          <div class="formato-label">Quadrado</div>
        </div>
        <div class="formato-opt" data-formato="retrato" onclick="selFormato(this)">
          <div class="formato-preview" style="width:38px;height:54px;"></div>
          <div class="formato-label">Retrato</div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:.6rem;margin-top:1.5rem;">
      <button class="btn" onclick="criarAlbum()">Criar álbum</button>
      <button class="btn btn-sec" onclick="irParaLista()">Cancelar</button>
    </div>
    <div id="novo-erro" style="margin-top:.75rem;font-size:.75rem;color:var(--coral);display:none;"></div>
  </div>

  <!-- Editor -->
  <div id="view-editor" class="hidden">
    <!-- Topbar -->
    <div id="canvas-topbar">
      <button class="btn btn-sec" onclick="irParaLista()" style="padding:4px 10px;font-size:.72rem;">← Álbuns</button>
      <div id="album-nome-topbar"></div>
      <div id="save-status">—</div>

async function criarAlbum() {
  var nome = document.getElementById('novo-nome').value.trim();
  var galeriaSlug = document.getElementById('novo-galeria').value;
  var formato = document.querySelector('.formato-opt.sel')?.dataset.formato || 'paisagem';
  var erro = document.getElementById('novo-erro');
  erro.style.display = 'none';

  if (!nome) { erro.textContent = 'Dá um nome para o álbum.'; erro.style.display = 'block'; return; }

  // Dimensões por formato
  var dims = { paisagem: [30,20], quadrado: [25,25], retrato: [20,28] };
  var d = dims[formato] || [30,20];

  var { data: album, error: e1 } = await _sb.from('albuns').insert({
    user_id: _userId, nome, formato, galeria_slug: galeriaSlug || null,
    largura_cm: d[0], altura_cm: d[1], status: 'rascunho', total_spreads: 3
  }).select().single();

  if (e1) { erro.textContent = 'Erro ao criar álbum. Tente novamente.'; erro.style.display = 'block'; return; }

  // Criar capa, 1 spread e contracapa
  var tipos = ['capa','spread','contracapa'];
  for (var i = 0; i < tipos.length; i++) {
    var tplId = i === 0 || i === 2 ? 'uma-foto' : 'duas-lado';
    var { data: spread } = await _sb.from('album_spreads').insert({
      album_id: album.id, user_id: _userId, posicao: i,
      tipo: tipos[i], template_id: tplId
    }).select().single();
    if (!spread) continue;
    var tpl = TEMPLATES.find(function(t) { return t.id === tplId; });
    if (!tpl) continue;
    var slots = tpl.slots.map(function(_, idx) {
      return { spread_id: spread.id, user_id: _userId, slot_index: idx };
    });
    if (slots.length) await _sb.from('album_slots').insert(slots);
  }

  await abrirAlbum(album);
}

  });

// ── Pool de fotos favoritadas ─────────────────────────────────────────────────

  var loading = document.getElementById('pool-loading');

// ── Konva — inicialização ─────────────────────────────────────────────────────
function calcDims() {
  var wrap = document.getElementById('konva-wrap');
  var aw = wrap.offsetWidth  - 48;
  var ah = wrap.offsetHeight - 48;
  var album = estado.album;
  var ratio = album.formato === 'quadrado' ? 2 : album.formato === 'retrato' ? 1.4 : 2.8;
  var w = aw;
  var h = w / ratio;
  if (h > ah) { h = ah; w = h * ratio; }
  _dimSpread = { w: Math.floor(w), h: Math.floor(h) };
}

function iniciarKonva() {
  calcDims();
  var container = document.getElementById('konva-container');
  container.innerHTML = '';
  container.style.width  = _dimSpread.w + 'px';
  container.style.height = _dimSpread.h + 'px';

  _stage = new Konva.Stage({ container: 'konva-container', width: _dimSpread.w, height: _dimSpread.h });
  _layer = new Konva.Layer();
  _stage.add(_layer);

  // Drop no canvas
  var domEl = _stage.container();
  domEl.addEventListener('dragover', function(e) { e.preventDefault(); });
  domEl.addEventListener('drop', function(e) {
    e.preventDefault();
    var key = e.dataTransfer.getData('text/plain');
    if (!key) return;
    var pos = _stage.getPointerPosition() || { x: e.offsetX, y: e.offsetY };
    var slotIdx = encontrarSlotNaPosicao(pos.x, pos.y);
    if (slotIdx < 0) return;
    salvarFotoNoSlot(slotIdx, key);
  });
}

// ── Renderizar spread no canvas ───────────────────────────────────────────────
function renderSpread() {
  if (!_stage || !_layer) return;
  _layer.destroyChildren();

  var spread = estado.spreads[estado.spreadAtivo];
  if (!spread) return;

  var tpl = TEMPLATES.find(function(t) { return t.id === spread.template_id; }) || TEMPLATES[0];
  var W = _dimSpread.w;
  var H = _dimSpread.h;

  // Fundo branco do spread
  _layer.add(new Konva.Rect({ x:0, y:0, width:W, height:H, fill:'#1e1b16' }));

  tpl.slots.forEach(function(s, idx) {
    var x = s.x * W, y = s.y * H, w = s.w * W, h = s.h * H;
    var slot = (spread.album_slots || [])[idx];
    var grupo = new Konva.Group({ x:0, y:0 });

    // Fundo do slot
    grupo.add(new Konva.Rect({ x:x, y:y, width:w, height:h, fill:'#2a2620', stroke:'#3a3530', strokeWidth:.5 }));

    // Foto, se houver
    if (slot && slot.foto_key) {
      var url = '/api/gallery-img?key=' + encodeURIComponent(slot.foto_key);
      Konva.Image.fromURL(url, function(img) {
        var scaleX = w / img.width();
        var scaleY = h / img.height();
        var scale  = Math.max(scaleX, scaleY) * (slot.foto_escala || 1);
        var imgW   = img.width()  * scale;
        var imgH   = img.height() * scale;
        img.setAttrs({
          x: x + (slot.foto_x || 0) + (w - imgW) / 2,
          y: y + (slot.foto_y || 0) + (h - imgH) / 2,
          width: imgW, height: imgH,
        });
        grupo.clipFunc(function(ctx) { ctx.rect(x, y, w, h); });
        grupo.add(img);
        _layer.batchDraw();
      });
    }

    // Rect transparente para drop
    var hitRect = new Konva.Rect({ x:x, y:y, width:w, height:h, fill:'transparent', name:'slot-'+idx });
    grupo.add(hitRect);
    _layer.add(grupo);
  });

  _layer.batchDraw();
  atualizarUsadasNoPool();
}

function encontrarSlotNaPosicao(px, py) {
  var spread = estado.spreads[estado.spreadAtivo];
  if (!spread) return -1;
  var tpl = TEMPLATES.find(function(t) { return t.id === spread.template_id; }) || TEMPLATES[0];
  var W = _dimSpread.w, H = _dimSpread.h;
  for (var i = 0; i < tpl.slots.length; i++) {
    var s = tpl.slots[i];
    if (px >= s.x*W && px <= (s.x+s.w)*W && py >= s.y*H && py <= (s.y+s.h)*H) return i;
  }
  return -1;
}

// ── Salvar foto no slot ───────────────────────────────────────────────────────
async function salvarFotoNoSlot(slotIdx, fotoKey) {
  var spread = estado.spreads[estado.spreadAtivo];
  if (!spread) return;
  var slot = (spread.album_slots || [])[slotIdx];
  if (!slot) return;

  slot.foto_key = fotoKey;
  estado.fotosUsadas.add(fotoKey);
  renderSpread();
  renderThumbs();

  salvarDebounced();
}

async function salvarEstadoAtual() {
  if (!estado.album) return;
  var promessas = [];
  estado.spreads.forEach(function(spread) {
    (spread.album_slots || []).forEach(function(slot) {
      promessas.push(
        _sb.from('album_slots').update({
          foto_key: slot.foto_key || null,
          foto_x: slot.foto_x || 0,
          foto_y: slot.foto_y || 0,
          foto_escala: slot.foto_escala || 1,
          atualizado_em: new Date().toISOString(),
        }).eq('id', slot.id).eq('user_id', _userId)
      );
    });
  });
  await Promise.all(promessas);
  setSaveStatus('Salvo ✓');
}

// ── Templates panel ───────────────────────────────────────────────────────────
function renderTemplates() {
  var grid = document.getElementById('tpl-grid');
  var spread = estado.spreads[estado.spreadAtivo];
  var tplAtivo = spread ? spread.template_id : null;
  grid.innerHTML = '';
  TEMPLATES.forEach(function(tpl) {
    var card = document.createElement('div');
    card.className = 'tpl-card' + (tpl.id === tplAtivo ? ' ativo' : '');

    var preview = document.createElement('div');
    preview.className = 'tpl-preview';
    tpl.slots.forEach(function(s) {
      var slot = document.createElement('div');
      slot.className = 'tpl-slot';
      slot.style.left   = (s.x * 100).toFixed(1) + '%';
      slot.style.top    = (s.y * 100).toFixed(1) + '%';
      slot.style.width  = (s.w * 100).toFixed(1) + '%';
      slot.style.height = (s.h * 100).toFixed(1) + '%';
      preview.appendChild(slot);
    });

    var nome = document.createElement('div');
    nome.className = 'tpl-nome';
    nome.textContent = tpl.nome;

    card.appendChild(preview);
    card.appendChild(nome);
    card.addEventListener('click', function() { aplicarTemplate(tpl.id); });
    grid.appendChild(card);
  });
}

async function aplicarTemplate(tplId) {
  var spread = estado.spreads[estado.spreadAtivo];
  if (!spread) return;

  var tplAnterior = TEMPLATES.find(function(t) { return t.id === spread.template_id; });
  var tplNovo     = TEMPLATES.find(function(t) { return t.id === tplId; });
  if (!tplNovo || spread.template_id === tplId) return;

  spread.template_id = tplId;

  // Ajustar slots: preservar fotos existentes, criar/remover conforme necessário
  var slotsAtuais = spread.album_slots || [];
  var qtdNova = tplNovo.slots.length;

  // Remover slots extras
  for (var i = qtdNova; i < slotsAtuais.length; i++) {
    await _sb.from('album_slots').delete().eq('id', slotsAtuais[i].id).eq('user_id', _userId);
  }
  spread.album_slots = slotsAtuais.slice(0, qtdNova);

  // Criar slots faltando
  for (var j = slotsAtuais.length; j < qtdNova; j++) {
    var { data: novoSlot } = await _sb.from('album_slots').insert({
      spread_id: spread.id, user_id: _userId, slot_index: j
    }).select().single();
    if (novoSlot) spread.album_slots.push(novoSlot);
  }

  // Atualizar template_id no banco
  await _sb.from('album_spreads').update({ template_id: tplId }).eq('id', spread.id).eq('user_id', _userId);

  renderTemplates();
  renderSpread();
  salvarDebounced();
}

// ── Barra de miniaturas ───────────────────────────────────────────────────────
function renderThumbs() {
  var bar = document.getElementById('thumbs-bar');
  // Preservar botão de adicionar
  var btn = bar.querySelector('.thumb-add');
  bar.innerHTML = '';

  estado.spreads.forEach(function(spread, idx) {
    var item = document.createElement('div');
    item.className = 'thumb-item' + (idx === estado.spreadAtivo ? ' ativo' : '');

    // Mini canvas para a miniatura
    var mini = document.createElement('canvas');
    var SCALE = 0.08;
    mini.width  = Math.floor(_dimSpread.w * SCALE);
    mini.height = Math.floor(_dimSpread.h * SCALE);
    var ctx = mini.getContext('2d');
    ctx.fillStyle = '#1e1b16';
    ctx.fillRect(0, 0, mini.width, mini.height);

    var tpl = TEMPLATES.find(function(t) { return t.id === spread.template_id; }) || TEMPLATES[0];
    tpl.slots.forEach(function(s, si) {
      var slot = (spread.album_slots || [])[si];
      var x = s.x * mini.width, y = s.y * mini.height;
      var w = s.w * mini.width, h = s.h * mini.height;
      ctx.fillStyle = slot && slot.foto_key ? '#5a4a2a' : '#2a2620';
      ctx.fillRect(x, y, w, h);
    });

    // Label tipo
    var label = document.createElement('div');
    label.style.cssText = 'position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:.48rem;color:rgba(255,255,255,.4);font-family:DM Sans,sans-serif;';
    label.textContent = spread.tipo === 'capa' ? 'capa' : spread.tipo === 'contracapa' ? 'fim' : idx;

    // Botão remover (exceto capa e contracapa)
    if (spread.tipo === 'spread') {
      var rmBtn = document.createElement('div');
      rmBtn.className = 'thumb-remove';
      rmBtn.textContent = '×';
      rmBtn.addEventListener('click', function(e) { e.stopPropagation(); removerSpread(spread.id); });
      item.appendChild(rmBtn);
    }

    item.appendChild(mini);
    item.appendChild(label);

    // Reordenar por drag (capa e contracapa fixas)
    var isMobile = spread.tipo !== 'spread';
    if (!isMobile) {
      item.draggable = true;
      item.addEventListener('dragstart', function(e) {
        _thumbDragIdx = idx;
        e.dataTransfer.effectAllowed = 'move';
        item.style.opacity = '0.4';
      });
      item.addEventListener('dragend', function() { item.style.opacity = ''; });
    }
    item.addEventListener('dragover', function(e) {
      if (_thumbDragIdx === null || spread.tipo !== 'spread') return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      item.style.outline = '2px solid var(--amber)';
    });
    item.addEventListener('dragleave', function() { item.style.outline = ''; });
    item.addEventListener('drop', function(e) {
      e.preventDefault();
      item.style.outline = '';
      if (_thumbDragIdx === null || _thumbDragIdx === idx) { _thumbDragIdx = null; return; }
      var from = _thumbDragIdx;
      _thumbDragIdx = null;
      reordenarSpreads(from, idx);
    });

    item.addEventListener('click', function() { mudarSpread(idx); });
    bar.appendChild(item);
  });

  if (btn) bar.appendChild(btn); else {
    var add = document.createElement('div');
    add.className = 'thumb-add';
    add.textContent = '+';
    add.title = 'Adicionar spread';
    add.addEventListener('click', adicionarSpread);
    bar.appendChild(add);
  }
}

function mudarSpread(idx) {
  estado.spreadAtivo = idx;
  renderThumbs();
  renderTemplates();
  renderSpread();
}

// ── Adicionar / remover spreads ───────────────────────────────────────────────
async function adicionarSpread() {
  // Insere antes da contracapa
  var posContracapa = estado.spreads.findIndex(function(s) { return s.tipo === 'contracapa'; });
  var novaPos = posContracapa >= 0 ? posContracapa : estado.spreads.length;

  // Atualiza posições dos spreads seguintes
  for (var i = novaPos; i < estado.spreads.length; i++) {
    await _sb.from('album_spreads').update({ posicao: i + 1 }).eq('id', estado.spreads[i].id).eq('user_id', _userId);
    estado.spreads[i].posicao = i + 1;
  }

  var tplId = 'duas-lado';
  var { data: spread } = await _sb.from('album_spreads').insert({
    album_id: estado.album.id, user_id: _userId, posicao: novaPos,
    tipo: 'spread', template_id: tplId
  }).select().single();

  if (!spread) return;
  var tpl = TEMPLATES.find(function(t) { return t.id === tplId; });
  var slotsData = tpl.slots.map(function(_, idx) { return { spread_id: spread.id, user_id: _userId, slot_index: idx }; });
  var { data: slots } = await _sb.from('album_slots').insert(slotsData).select();
  spread.album_slots = slots || [];
  estado.spreads.splice(novaPos, 0, spread);
  estado.spreadAtivo = novaPos;

  renderThumbs();
  renderTemplates();
  renderSpread();
}

var _thumbDragIdx = null;

async function reordenarSpreads(deIdx, paraIdx) {
  // Capa (0) e contracapa (último) nunca se movem
  var ultimo = estado.spreads.length - 1;
  if (deIdx === 0 || deIdx === ultimo) return;
  if (paraIdx === 0 || paraIdx === ultimo) return;
  if (deIdx === paraIdx) return;

  var spreads = estado.spreads.slice();
  var [movido] = spreads.splice(deIdx, 1);
  spreads.splice(paraIdx, 0, movido);
  estado.spreads = spreads;

  // Atualiza spreadAtivo para seguir o spread movido
  if (estado.spreadAtivo === deIdx) estado.spreadAtivo = paraIdx;
  else if (deIdx < estado.spreadAtivo && paraIdx >= estado.spreadAtivo) estado.spreadAtivo--;
  else if (deIdx > estado.spreadAtivo && paraIdx <= estado.spreadAtivo) estado.spreadAtivo++;

  // Persiste posições no Supabase em paralelo
  var updates = estado.spreads.map(function(s, i) {
    s.posicao = i;
    return _sb.from('album_spreads').update({ posicao: i }).eq('id', s.id).eq('user_id', _userId);
  });
  await Promise.all(updates);

  renderThumbs();
  renderSpread();
}

async function removerSpread(spreadId) {
  var idx = estado.spreads.findIndex(function(s) { return s.id === spreadId; });
  if (idx < 0) return;
  if (estado.spreads[idx].tipo !== 'spread') return;

  await _sb.from('album_spreads').delete().eq('id', spreadId).eq('user_id', _userId);
  estado.spreads.splice(idx, 1);
  if (estado.spreadAtivo >= estado.spreads.length) estado.spreadAtivo = Math.max(0, estado.spreads.length - 1);

  renderThumbs();
  renderTemplates();
  renderSpread();
}

// ── Atualizar pool visual após mudanças ──────────────────────────────────────
function atualizarUsadasNoPool() {
  document.querySelectorAll('.pool-foto').forEach(function(el) {
    var key = el.dataset.key;
    if (estado.fotosUsadas.has(key)) el.classList.add('usada'); else el.classList.remove('usada');
  });
}

// ── Utilitários ───────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
