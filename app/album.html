<head>
<meta charset="UTF-8">

<title>Álbuns — Kelvn</title>

<link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F4EF;--surface:#FFFFFF;--surface2:#F0EDE6;--surface3:#E8E3DA;
  --border:rgba(0,0,0,0.04);--border-strong:rgba(0,0,0,0.09);
  --text:#1A1814;--text-muted:#6B6660;--text-hint:#B0ABA6;
  --amber:#C4780A;--amber-light:#FDF3E3;--amber-deep:#8A4F00;
  --coral:#C43A1A;--coral-light:#FDF0EC;
  --teal:#0A7864;--teal-light:#E3F4EF;
  --purple:#5255A0;--purple-light:#EEF0FF;
  --radius:8px;--radius-sm:5px;
}
[data-theme="dark"]{
  --bg:#111009;--surface:#1A1814;--surface2:#211E18;--surface3:#2A2620;
  --border:rgba(255,255,255,0.04);--border-strong:rgba(255,255,255,0.07);
  --text:#EDE9E3;--text-muted:#9E9892;--text-hint:#5C5854;
  --amber:#D4902A;--amber-light:#221808;--amber-deep:#C4780A;
  --coral:#CC4A28;--coral-light:#1E0E08;
  --teal:#18926E;--teal-light:#091E15;
  --purple:#8A8DCC;--purple-light:#12142A;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:calc(100vh / 0.9);overflow:hidden;display:flex;zoom:0.9;}

/* ── Sidebar (idêntica à Kelvn) ──────────────────────────────────── */
.snav{width:56px;flex-shrink:0;background:var(--bg);border-right:.5px solid var(--border-strong);display:flex;flex-direction:column;align-items:center;padding:1rem 0;position:fixed;top:0;left:0;height:calc(100vh / 0.9);z-index:100;gap:2px;}
.snav-logo{font-family:'Cherry Bomb One',cursive;font-size:1.6rem;color:var(--amber);margin-bottom:.75rem;padding:.25rem 0;line-height:1;text-decoration:none;}
.snav-sep{width:28px;height:.5px;background:var(--border-strong);margin:.5rem 0;}
.snav-btn{width:38px;height:38px;border-radius:10px;border:none;background:transparent;color:var(--text-hint);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;position:relative;flex-shrink:0;text-decoration:none;}
.snav-btn:hover{background:var(--surface2);color:var(--text-muted);}
.snav-btn.active{background:transparent;color:var(--amber);}
.snav-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:4px;}

/* ── Main ────────────────────────────────────────────────────────── */
#main{flex:1;margin-left:56px;min-width:0;overflow:hidden;display:flex;flex-direction:column;}

/* ── Estado: Lista de álbuns ─────────────────────────────────────── */
#view-lista{flex:1;overflow-y:auto;padding:2rem 2.5rem 4rem;}
.view-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;}
.view-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--text);}
.btn{display:inline-flex;align-items:center;gap:.4rem;background:var(--text);color:var(--bg);border:.5px solid var(--text);border-radius:8px;padding:6px 15px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-sec{background:transparent;color:var(--text-muted);border:.5px solid var(--border-strong);}
.btn-sec:hover{color:var(--text);opacity:1;}
#albuns-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;}
.album-card{background:var(--surface);border:.5px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem;cursor:pointer;transition:border-color .15s;}
.album-card:hover{border-color:var(--border-strong);}
.album-card-nome{font-size:.88rem;font-weight:500;color:var(--text);margin-bottom:.35rem;}
.album-card-sub{font-size:.68rem;color:var(--text-hint);}
.album-card-badge{display:inline-block;font-size:.58rem;padding:2px 8px;border-radius:20px;margin-top:.5rem;}
.badge-rascunho{background:var(--surface2);color:var(--text-hint);}
.badge-finalizado{background:var(--teal-light);color:var(--teal);}
#albuns-empty{padding:4rem 0;text-align:center;color:var(--text-hint);font-size:.85rem;display:none;}

/* ── Estado: Novo álbum ──────────────────────────────────────────── */
#view-novo{flex:1;overflow-y:auto;padding:2rem 2.5rem;}
.form-group{margin-bottom:1.1rem;}
.form-label{font-size:.72rem;color:var(--text-muted);margin-bottom:.4rem;display:block;}
.form-input{width:100%;max-width:440px;padding:8px 12px;background:var(--surface);border:.5px solid var(--border-strong);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--amber);}
.formato-grid{display:flex;gap:.6rem;flex-wrap:wrap;}
.formato-opt{display:flex;flex-direction:column;align-items:center;gap:.4rem;padding:.6rem .8rem;border:.5px solid var(--border-strong);border-radius:8px;cursor:pointer;transition:border-color .15s,background .15s;}
.formato-opt:hover{border-color:var(--border-strong);background:var(--surface2);}
.formato-opt.sel{border-color:var(--amber);background:var(--amber-light);}
.formato-preview{background:var(--surface2);border-radius:3px;}
.formato-label{font-size:.65rem;color:var(--text-hint);}

/* ── Estado: Editor ──────────────────────────────────────────────── */
#view-editor{flex:1;display:flex;overflow:hidden;}

/* Pool esquerdo */
#pool-panel{width:220px;flex-shrink:0;background:var(--surface);border-right:.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#pool-header{padding:.75rem 1rem;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
#pool-titulo{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-hint);}
#pool-count{font-size:.65rem;color:var(--text-hint);}
#pool-grid{flex:1;overflow-y:auto;padding:.5rem;display:grid;grid-template-columns:1fr 1fr;gap:.35rem;}
.pool-foto{aspect-ratio:1;border-radius:5px;overflow:hidden;cursor:grab;position:relative;background:var(--surface2);}
.pool-foto img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
.pool-foto.usada::after{content:'✓';position:absolute;inset:0;background:rgba(10,120,100,.55);display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;pointer-events:none;}
.pool-foto.usada{opacity:.5;}
#pool-empty{padding:2rem 1rem;text-align:center;font-size:.72rem;color:var(--text-hint);display:none;}
#pool-loading{padding:2rem 1rem;text-align:center;font-size:.72rem;color:var(--text-hint);}

/* Área central do canvas */
#canvas-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
#canvas-topbar{padding:.5rem 1rem;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:.75rem;background:var(--surface);}
#album-nome-topbar{font-size:.82rem;font-weight:500;color:var(--text);}
#save-status{font-size:.65rem;color:var(--text-hint);margin-left:auto;}
#canvas-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#konva-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:1.5rem;overflow:hidden;}
#thumbs-bar{height:88px;background:var(--surface);border-top:.5px solid var(--border);display:flex;align-items:center;gap:.5rem;padding:0 1rem;overflow-x:auto;flex-shrink:0;}
.thumb-item{height:64px;flex-shrink:0;border-radius:5px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s;position:relative;background:var(--surface2);}
.thumb-item.ativo{border-color:var(--amber);}
.thumb-item canvas{height:100%;width:auto;display:block;}
.thumb-add{height:64px;width:44px;flex-shrink:0;border:.5px dashed var(--border-strong);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-hint);font-size:1.1rem;transition:color .15s,border-color .15s;}
.thumb-add:hover{color:var(--amber);border-color:var(--amber);}
.thumb-remove{position:absolute;top:2px;right:2px;width:14px;height:14px;background:rgba(196,58,26,.8);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:.55rem;color:#fff;cursor:pointer;line-height:1;}
.thumb-item:hover .thumb-remove{display:flex;}

/* Painel de templates */
#templates-panel{width:188px;flex-shrink:0;background:var(--surface);border-left:.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#tpl-header{padding:.75rem 1rem;border-bottom:.5px solid var(--border);font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-hint);}
#tpl-grid{flex:1;overflow-y:auto;padding:.5rem;display:grid;grid-template-columns:1fr 1fr;gap:.4rem;}
.tpl-card{border:.5px solid var(--border);border-radius:6px;cursor:pointer;padding:.4rem;transition:border-color .15s,background .15s;}
.tpl-card:hover{border-color:var(--border-strong);background:var(--surface2);}
.tpl-card.ativo{border-color:var(--amber);background:var(--amber-light);}
.tpl-preview{width:100%;aspect-ratio:2;background:var(--surface2);border-radius:3px;margin-bottom:.3rem;position:relative;overflow:hidden;}
.tpl-slot{position:absolute;background:var(--surface3);border:.5px solid var(--border-strong);}
.tpl-nome{font-size:.58rem;color:var(--text-hint);text-align:center;}

/* ── Nível 4 — Refinamento visual ───────────────────────────────── */
/* Painel de propriedades do spread (substitui templates quando prop ativo) */
#props-panel{width:188px;flex-shrink:0;background:var(--surface);border-left:.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#props-panel.hidden{display:none!important;}
#props-header{padding:.75rem 1rem;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
#props-titulo{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-hint);}
#props-body{flex:1;overflow-y:auto;padding:.75rem;}
.props-section{margin-bottom:1rem;}
.props-label{font-size:.63rem;color:var(--text-hint);margin-bottom:.4rem;display:block;}
.swatches{display:flex;flex-wrap:wrap;gap:.35rem;}
.swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:transform .1s;}
.swatch:hover{transform:scale(1.15);}
.swatch.sel{border-color:var(--amber);}
.props-slider{width:100%;accent-color:var(--amber);}
.props-btn{width:100%;padding:5px 8px;font-size:.7rem;background:var(--surface2);border:.5px solid var(--border-strong);border-radius:6px;color:var(--text-muted);cursor:pointer;margin-top:.35rem;text-align:left;transition:color .15s;}
.props-btn:hover{color:var(--text);}
.props-btn.danger{color:var(--coral);}
/* Toolbar Desfazer/Refazer */
#btn-undo,#btn-redo{padding:4px 9px;font-size:.72rem;opacity:.4;pointer-events:none;}
#btn-undo.ativo,#btn-redo.ativo{opacity:1;pointer-events:auto;}
/* Slot em modo de edição */
.slot-editando-overlay{position:absolute;pointer-events:none;}
/* Texto inline textarea */
.texto-inline-edit{position:absolute;background:transparent;border:1px solid var(--amber);outline:none;resize:none;padding:4px;line-height:1.4;color:inherit;font-family:inherit;}
/* Seletores de alinhamento e fonte */
.align-btns{display:flex;gap:.3rem;}
.align-btn{flex:1;padding:3px 0;font-size:.7rem;background:var(--surface2);border:.5px solid var(--border-strong);border-radius:4px;cursor:pointer;color:var(--text-muted);transition:color .15s,background .15s;}
.align-btn.sel{background:var(--amber-light);color:var(--amber);border-color:var(--amber);}
.fonte-sel{width:100%;padding:4px 8px;background:var(--surface2);border:.5px solid var(--border-strong);border-radius:6px;color:var(--text-muted);font-size:.7rem;cursor:pointer;}

/* ── Auto-layout ─────────────────────────────────────────────────── */
#btn-autolayout{display:none;padding:4px 12px;font-size:.72rem;}
#modal-autolayout{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:center;justify-content:center;}
#modal-autolayout.open{display:flex;}
.modal-box{background:var(--surface);border:.5px solid var(--border-strong);border-radius:12px;width:min(820px,92vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-header{padding:1rem 1.25rem;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:.75rem;}
.modal-titulo{font-family:'Playfair Display',serif;font-size:1rem;flex:1;}
.modal-opts{padding:.75rem 1.25rem;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:1.25rem;}
.toggle-wrap{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--text-muted);cursor:pointer;user-select:none;}
.toggle-wrap input{accent-color:var(--amber);}
#modal-preview-grid{flex:1;overflow-y:auto;padding:1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;}
.modal-spread-item{background:var(--surface2);border-radius:6px;overflow:hidden;border:.5px solid var(--border);}
.modal-spread-label{font-size:.58rem;color:var(--text-hint);text-align:center;padding:.3rem 0;}
.modal-footer{padding:.75rem 1.25rem;border-top:.5px solid var(--border);display:flex;align-items:center;gap:.6rem;justify-content:flex-end;}

/* ── Utilitários ─────────────────────────────────────────────────── */
.hidden{display:none!important;}
.drop-over{outline:2px solid var(--amber)!important;outline-offset:-2px;}
#overlay-auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;font-size:.85rem;color:var(--text-hint);}
</style>
</head>

function syncThemeIcons() {

async function carregarSd() {

      document.documentElement.setAttribute('data-theme', _sd.theme);

  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem('kelvn_theme', t); } catch(e) {} // cache pré-paint
  // Fonte da verdade: Supabase (merge no sd para não apagar outras configs)
  _sd.theme = t;
  if (_userId) {
    _sb.from('configuracoes').upsert(
      { user_id: _userId, sd: _sd, atualizado_em: new Date().toISOString() },

async function renderLista() {
  var grid = document.getElementById('albuns-grid');
  var empty = document.getElementById('albuns-empty');
  grid.innerHTML = '<div style="color:var(--text-hint);font-size:.78rem;">Carregando…</div>';
  empty.style.display = 'none';

  var { data: rows, error } = await _sb.from('albuns').select('*').eq('user_id', _userId).order('criado_em', { ascending: false });
  if (error || !rows || !rows.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  grid.innerHTML = '';
  rows.forEach(function(a) {
    var card = document.createElement('div');
    card.className = 'album-card';
    card.innerHTML =
      '<div class="album-card-nome">' + esc(a.nome) + '</div>' +
      '<div class="album-card-sub">' + esc(a.formato) + (a.galeria_slug ? ' · ' + esc(a.galeria_slug) : '') + '</div>' +
      '<span class="album-card-badge ' + (a.status === 'finalizado' ? 'badge-finalizado' : 'badge-rascunho') + '">' + esc(a.status) + '</span>';
    card.addEventListener('click', function() { abrirAlbum(a); });
    grid.appendChild(card);
  });
}

// ── Criar álbum ───────────────────────────────────────────────────────────────
function selFormato(el) {
  document.querySelectorAll('.formato-opt').forEach(function(f) { f.classList.remove('sel'); });
  el.classList.add('sel');
}

async function criarAlbum() {
  var nome = document.getElementById('novo-nome').value.trim();
  var galeriaSlug = document.getElementById('novo-galeria').value;
  var formato = document.querySelector('.formato-opt.sel')?.dataset.formato || 'paisagem';
  var erro = document.getElementById('novo-erro');
  erro.style.display = 'none';

  if (!nome) { erro.textContent = 'Dá um nome para o álbum.'; erro.style.display = 'block'; return; }

  // Dimensões por formato
  var dims = { paisagem: [30,20], quadrado: [25,25], retrato: [20,28] };
  var d = dims[formato] || [30,20];

  var { data: album, error: e1 } = await _sb.from('albuns').insert({
    user_id: _userId, nome, formato, galeria_slug: galeriaSlug || null,
    largura_cm: d[0], altura_cm: d[1], status: 'rascunho', total_spreads: 3
  }).select().single();

  if (e1) { erro.textContent = 'Erro ao criar álbum. Tente novamente.'; erro.style.display = 'block'; return; }

  // Criar capa, 1 spread e contracapa
  var tipos = ['capa','spread','contracapa'];
  for (var i = 0; i < tipos.length; i++) {
    var tplId = i === 0 || i === 2 ? 'uma-foto' : 'duas-lado';
    var { data: spread } = await _sb.from('album_spreads').insert({
      album_id: album.id, user_id: _userId, posicao: i,
      tipo: tipos[i], template_id: tplId
    }).select().single();
    if (!spread) continue;
    var tpl = TEMPLATES.find(function(t) { return t.id === tplId; });
    if (!tpl) continue;
    var slots = tpl.slots.map(function(_, idx) {
      return { spread_id: spread.id, user_id: _userId, slot_index: idx };
    });
    if (slots.length) await _sb.from('album_slots').insert(slots);
  }

  await abrirAlbum(album);
}

// ── Abrir álbum ───────────────────────────────────────────────────────────────
async function abrirAlbum(albumObj) {
  estado.album = albumObj;
  estado.spreadAtivo = 0;
  mostrar('view-editor');
  document.getElementById('album-nome-topbar').textContent = albumObj.nome;
  setSaveStatus('—');

  await Promise.all([
    carregarSpreads(),
    carregarPool(albumObj.galeria_slug),
  ]);

  // Carregar textos de cada spread
  await Promise.all(estado.spreads.map(async function(s) {
    s._textos = await carregarTextos(s.id);
  }));

  // Resetar histórico ao abrir álbum
  historico.pilha = []; historico.refeita = [];
  atualizarBotoesHistorico();
  fecharProps();

  renderTemplates();
  iniciarKonva();
  renderThumbs();
  renderSpread();
}

// ── Carregar spreads + slots ──────────────────────────────────────────────────
async function carregarSpreads() {
  var { data: spreads } = await _sb.from('album_spreads')
    .select('*, album_slots(*)')
    .eq('album_id', estado.album.id)
    .eq('user_id', _userId)
    .order('posicao', { ascending: true });

  estado.spreads = (spreads || []).map(function(s) {
    s.album_slots = (s.album_slots || []).sort(function(a,b){ return a.slot_index - b.slot_index; });
    return s;
  });

  // Reconstruir fotosUsadas
  estado.fotosUsadas = new Set();
  estado.spreads.forEach(function(s) {
    (s.album_slots || []).forEach(function(slot) {
      if (slot.foto_key) estado.fotosUsadas.add(slot.foto_key);
    });
  });
}

// ── Pool de fotos favoritadas ─────────────────────────────────────────────────
async function carregarPool(galeriaSlug) {
  var loading = document.getElementById('pool-loading');
  var empty   = document.getElementById('pool-empty');
  var grid    = document.getElementById('pool-grid');
  var count   = document.getElementById('pool-count');

  grid.innerHTML = '';
  loading.style.display = 'block';
  empty.style.display   = 'none';

  if (!galeriaSlug) {
    loading.style.display = 'none';
    empty.style.display   = 'block';
    empty.textContent     = 'Este álbum não tem galeria vinculada.';
    return;
  }

  // Verificar posse da galeria antes de carregar favoritos
  var { data: galeria } = await _sb.from('galerias').select('slug').eq('slug', galeriaSlug).eq('user_id', _userId).maybeSingle();
  if (!galeria) {
    loading.style.display = 'none';
    empty.style.display   = 'block';
    empty.textContent     = 'Galeria não encontrada.';
    return;
  }

  var { data: rows } = await _sb.from('galeria_favoritos')
    .select('foto_ids')
    .eq('galeria_slug', galeriaSlug);

  // Agregar todas as foto_ids de todas as listas/emails
  var todas = new Set();
  (rows || []).forEach(function(r) {
    (r.foto_ids || []).forEach(function(k) { todas.add(k); });
  });

  estado.pool = Array.from(todas).map(function(k) { return { key: k, w: 0, h: 0 }; });
  loading.style.display = 'none';

  if (!estado.pool.length) {
    empty.style.display = 'block';
    count.textContent   = '';
    document.getElementById('btn-autolayout').style.display = 'none';
    return;
  }

  count.textContent = estado.pool.length + ' fotos';
  document.getElementById('btn-autolayout').style.display = '';
  renderPool();
}

function renderPool() {
  var grid = document.getElementById('pool-grid');
  grid.innerHTML = '';
  estado.pool.forEach(function(foto) {
    var key = foto.key;
    var div = document.createElement('div');
    div.className = 'pool-foto' + (estado.fotosUsadas.has(key) ? ' usada' : '');
    div.draggable = true;
    div.dataset.key = key;

    var img = document.createElement('img');
    img.src = '/api/gallery-img?key=' + encodeURIComponent(key);
    img.loading = 'lazy';
    img.alt = '';
    // Captura dimensões ao carregar (para auto-layout sem fetch extra)
    img.onload = function() { if (!foto.w) { foto.w = img.naturalWidth; foto.h = img.naturalHeight; } };
    div.appendChild(img);

    div.addEventListener('dragstart', function(e) {
      e.dataTransfer.setData('text/plain', key);
      e.dataTransfer.effectAllowed = 'copy';
    });

    grid.appendChild(div);
  });
}

// ── Konva — inicialização ─────────────────────────────────────────────────────
function calcDims() {
  var wrap = document.getElementById('konva-wrap');
  var aw = wrap.offsetWidth  - 48;
  var ah = wrap.offsetHeight - 48;
  var album = estado.album;
  var ratio = album.formato === 'quadrado' ? 2 : album.formato === 'retrato' ? 1.4 : 2.8;
  var w = aw;
  var h = w / ratio;
  if (h > ah) { h = ah; w = h * ratio; }
  _dimSpread = { w: Math.floor(w), h: Math.floor(h) };
}

function iniciarKonva() {
  calcDims();
  var container = document.getElementById('konva-container');
  container.innerHTML = '';
  container.style.width  = _dimSpread.w + 'px';
  container.style.height = _dimSpread.h + 'px';

  _stage = new Konva.Stage({ container: 'konva-container', width: _dimSpread.w, height: _dimSpread.h });
  _layer = new Konva.Layer();
  _stage.add(_layer);

  // Drop no canvas
  var domEl = _stage.container();
  domEl.addEventListener('dragover', function(e) { e.preventDefault(); });
  domEl.addEventListener('drop', function(e) {
    e.preventDefault();
    var key = e.dataTransfer.getData('text/plain');
    if (!key) return;
    var pos = _stage.getPointerPosition() || { x: e.offsetX, y: e.offsetY };
    var slotIdx = encontrarSlotNaPosicao(pos.x, pos.y);
    if (slotIdx < 0) return;
    salvarFotoNoSlot(slotIdx, key);
  });
}

// ── Renderizar spread no canvas ───────────────────────────────────────────────
function renderSpread() {
  if (!_stage || !_layer) return;
  _slotEmEdicao = null;
  _layer.destroyChildren();

  var spread = estado.spreads[estado.spreadAtivo];
  if (!spread) return;

  var W = _dimSpread.w, H = _dimSpread.h;
  var bgColor = spread.background_color || '#1e1b16';

  // Fundo do spread
  _layer.add(new Konva.Rect({ x:0, y:0, width:W, height:H, fill:bgColor }));

  // Full-bleed: foto cobre o spread inteiro
  var slots = spread.album_slots || [];
  if (spread.full_bleed && slots.length > 0 && slots[0] && slots[0].foto_key) {
    (function(fotoKey) {
      var url = '/api/gallery-img?key=' + encodeURIComponent(fotoKey);
      Konva.Image.fromURL(url, function(img) {
        var sc = Math.max(W / img.width(), H / img.height());
        img.setAttrs({ x: (W - img.width()*sc)/2, y: (H - img.height()*sc)/2, width: img.width()*sc, height: img.height()*sc });
        _layer.add(img);
        _layer.batchDraw();
      });
    })(slots[0].foto_key);
    renderizarTextos(spread._textos || []);
    _layer.batchDraw();
    atualizarUsadasNoPool();
    return;
  }

  var tpl = TEMPLATES.find(function(t) { return t.id === spread.template_id; }) || TEMPLATES[0];
  var margemPx = spread.margem_px != null ? spread.margem_px : 8;
  var gutterPx = spread.gutter_px  != null ? spread.gutter_px  : 8;
  var slotsAjust = aplicarEspacamento(tpl.slots, margemPx, gutterPx, W, H);

  slotsAjust.forEach(function(s, idx) {
    var x = s.x * W, y = s.y * H, w = s.w * W, h = s.h * H;
    var slot = slots[idx];
    var grupo = new Konva.Group({ x:0, y:0, name:'grupo-slot-'+idx });

    // Fundo do slot
    var bgSlot = new Konva.Rect({ x:x, y:y, width:w, height:h, fill:'#2a2620', stroke:'rgba(255,255,255,0.06)', strokeWidth:.5, name:'bg-slot' });
    grupo.add(bgSlot);

    // Foto, se houver
    if (slot && slot.foto_key) {
      (function(slotRef, gx, gy, gw, gh, grupoRef) {
        var url = '/api/gallery-img?key=' + encodeURIComponent(slotRef.foto_key);
        Konva.Image.fromURL(url, function(img) {
          var scMin = Math.max(gw / img.width(), gh / img.height());
          var sc    = slotRef.foto_escala > 0 ? slotRef.foto_escala : scMin;
          sc = Math.max(scMin, sc);
          var imgX  = gx + (slotRef.foto_x || 0);
          var imgY  = gy + (slotRef.foto_y || 0);
          // centrar se offset padrão
          if (slotRef.foto_x === 0 && slotRef.foto_y === 0) {
            imgX = gx + (gw - img.width() * sc) / 2;
            imgY = gy + (gh - img.height() * sc) / 2;
          }
          img.setAttrs({ x: imgX, y: imgY, scaleX: sc, scaleY: sc, name:'img-foto' });
          grupoRef.clipFunc(function(ctx) { ctx.rect(gx, gy, gw, gh); });
          grupoRef.add(img);
          _layer.batchDraw();

          // Duplo clique ativa crop
          img.on('dblclick dbltap', function() {
            ativarModoEdicaoSlot(grupoRef, slotRef, { x: gx, y: gy, w: gw, h: gh });
          });
        });
      })(slot, x, y, w, h, grupo);
    }

    // HitRect para drop
    var hitRect = new Konva.Rect({ x:x, y:y, width:w, height:h, fill:'transparent', name:'slot-'+idx });
    grupo.add(hitRect);
    _layer.add(grupo);
  });

  // Textos do spread
  renderizarTextos(spread._textos || []);

  // Botão de propriedades (clique no canvas fora dos slots)
  _stage.off('click.props');
  _stage.on('click.props', function(e) {
    if (e.target === _stage || e.target.name() === 'bg') {
      if (_slotEmEdicao) sairModoEdicaoSlot(false);
    }
  });

  _layer.batchDraw();
  atualizarUsadasNoPool();
}

function encontrarSlotNaPosicao(px, py) {
  var spread = estado.spreads[estado.spreadAtivo];
  if (!spread) return -1;
  var tpl = TEMPLATES.find(function(t) { return t.id === spread.template_id; }) || TEMPLATES[0];
  var W = _dimSpread.w, H = _dimSpread.h;
  for (var i = 0; i < tpl.slots.length; i++) {
    var s = tpl.slots[i];
    if (px >= s.x*W && px <= (s.x+s.w)*W && py >= s.y*H && py <= (s.y+s.h)*H) return i;
  }
  return -1;
}

// ── Salvar foto no slot ───────────────────────────────────────────────────────
async function salvarFotoNoSlot(slotIdx, fotoKey) {
  var spread = estado.spreads[estado.spreadAtivo];
  if (!spread) return;
  var slot = (spread.album_slots || [])[slotIdx];
  if (!slot) return;

  slot.foto_key = fotoKey;
  estado.fotosUsadas.add(fotoKey);
  renderSpread();
  renderThumbs();

  salvarDebounced();
}

async function salvarEstadoAtual() {
  if (!estado.album) return;
  var promessas = [];
  estado.spreads.forEach(function(spread) {
    (spread.album_slots || []).forEach(function(slot) {
      promessas.push(
        _sb.from('album_slots').update({
          foto_key: slot.foto_key || null,
          foto_x: slot.foto_x || 0,
          foto_y: slot.foto_y || 0,
          foto_escala: slot.foto_escala || 1,
          atualizado_em: new Date().toISOString(),
        }).eq('id', slot.id).eq('user_id', _userId)
      );
    });
  });
  await Promise.all(promessas);
  setSaveStatus('Salvo ✓');
}

// ── Templates panel ───────────────────────────────────────────────────────────
function renderTemplates() {
  var grid = document.getElementById('tpl-grid');
  var spread = estado.spreads[estado.spreadAtivo];
  var tplAtivo = spread ? spread.template_id : null;
  grid.innerHTML = '';
  TEMPLATES.forEach(function(tpl) {
    var card = document.createElement('div');
    card.className = 'tpl-card' + (tpl.id === tplAtivo ? ' ativo' : '');

    var preview = document.createElement('div');
    preview.className = 'tpl-preview';
    tpl.slots.forEach(function(s) {
      var slot = document.createElement('div');
      slot.className = 'tpl-slot';
      slot.style.left   = (s.x * 100).toFixed(1) + '%';
      slot.style.top    = (s.y * 100).toFixed(1) + '%';
      slot.style.width  = (s.w * 100).toFixed(1) + '%';
      slot.style.height = (s.h * 100).toFixed(1) + '%';
      preview.appendChild(slot);
    });

    var nome = document.createElement('div');
    nome.className = 'tpl-nome';
    nome.textContent = tpl.nome;

    card.appendChild(preview);
    card.appendChild(nome);
    card.addEventListener('click', function() { aplicarTemplate(tpl.id); });
    grid.appendChild(card);
  });
}

async function aplicarTemplate(tplId) {
  var spread = estado.spreads[estado.spreadAtivo];
  if (!spread) return;

  var tplAnterior = TEMPLATES.find(function(t) { return t.id === spread.template_id; });
  var tplNovo     = TEMPLATES.find(function(t) { return t.id === tplId; });
  if (!tplNovo || spread.template_id === tplId) return;

  spread.template_id = tplId;

  // Ajustar slots: preservar fotos existentes, criar/remover conforme necessário
  var slotsAtuais = spread.album_slots || [];
  var qtdNova = tplNovo.slots.length;

  // Remover slots extras
  for (var i = qtdNova; i < slotsAtuais.length; i++) {
    await _sb.from('album_slots').delete().eq('id', slotsAtuais[i].id).eq('user_id', _userId);
  }
  spread.album_slots = slotsAtuais.slice(0, qtdNova);

  // Criar slots faltando
  for (var j = slotsAtuais.length; j < qtdNova; j++) {
    var { data: novoSlot } = await _sb.from('album_slots').insert({
      spread_id: spread.id, user_id: _userId, slot_index: j
    }).select().single();
    if (novoSlot) spread.album_slots.push(novoSlot);
  }

  // Atualizar template_id no banco
  await _sb.from('album_spreads').update({ template_id: tplId }).eq('id', spread.id).eq('user_id', _userId);

  renderTemplates();
  renderSpread();
  salvarDebounced();
}

// ── Barra de miniaturas ───────────────────────────────────────────────────────
function renderThumbs() {
  var bar = document.getElementById('thumbs-bar');
  // Preservar botão de adicionar
  var btn = bar.querySelector('.thumb-add');
  bar.innerHTML = '';

  estado.spreads.forEach(function(spread, idx) {
    var item = document.createElement('div');
    item.className = 'thumb-item' + (idx === estado.spreadAtivo ? ' ativo' : '');

    // Mini canvas para a miniatura
    var mini = document.createElement('canvas');
    var SCALE = 0.08;
    mini.width  = Math.floor(_dimSpread.w * SCALE);
    mini.height = Math.floor(_dimSpread.h * SCALE);
    var ctx = mini.getContext('2d');
    ctx.fillStyle = '#1e1b16';
    ctx.fillRect(0, 0, mini.width, mini.height);

    var tpl = TEMPLATES.find(function(t) { return t.id === spread.template_id; }) || TEMPLATES[0];
    tpl.slots.forEach(function(s, si) {
      var slot = (spread.album_slots || [])[si];
      var x = s.x * mini.width, y = s.y * mini.height;
      var w = s.w * mini.width, h = s.h * mini.height;
      ctx.fillStyle = slot && slot.foto_key ? '#5a4a2a' : '#2a2620';
      ctx.fillRect(x, y, w, h);
    });

    // Label tipo
    var label = document.createElement('div');
    label.style.cssText = 'position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:.48rem;color:rgba(255,255,255,.4);font-family:DM Sans,sans-serif;';
    label.textContent = spread.tipo === 'capa' ? 'capa' : spread.tipo === 'contracapa' ? 'fim' : idx;

    // Botão remover (exceto capa e contracapa)
    if (spread.tipo === 'spread') {
      var rmBtn = document.createElement('div');
      rmBtn.className = 'thumb-remove';
      rmBtn.textContent = '×';
      rmBtn.addEventListener('click', function(e) { e.stopPropagation(); removerSpread(spread.id); });
      item.appendChild(rmBtn);
    }

    item.appendChild(mini);
    item.appendChild(label);

    // Reordenar por drag (capa e contracapa fixas)
    var isMobile = spread.tipo !== 'spread';
    if (!isMobile) {
      item.draggable = true;
      item.addEventListener('dragstart', function(e) {
        _thumbDragIdx = idx;
        e.dataTransfer.effectAllowed = 'move';
        item.style.opacity = '0.4';
      });
      item.addEventListener('dragend', function() { item.style.opacity = ''; });
    }
    item.addEventListener('dragover', function(e) {
      if (_thumbDragIdx === null || spread.tipo !== 'spread') return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      item.style.outline = '2px solid var(--amber)';
    });
    item.addEventListener('dragleave', function() { item.style.outline = ''; });
    item.addEventListener('drop', function(e) {
      e.preventDefault();
      item.style.outline = '';
      if (_thumbDragIdx === null || _thumbDragIdx === idx) { _thumbDragIdx = null; return; }
      var from = _thumbDragIdx;
      _thumbDragIdx = null;
      reordenarSpreads(from, idx);
    });

    item.addEventListener('click', function() { mudarSpread(idx); });
    bar.appendChild(item);
  });

  if (btn) bar.appendChild(btn); else {
    var add = document.createElement('div');
    add.className = 'thumb-add';
    add.textContent = '+';
    add.title = 'Adicionar spread';
    add.addEventListener('click', adicionarSpread);
    bar.appendChild(add);
  }
}

async function mudarSpread(idx) {
  estado.spreadAtivo = idx;
  var spread = estado.spreads[idx];
  if (spread && !spread._textos) {
    spread._textos = await carregarTextos(spread.id);
  }
  renderThumbs();
  renderTemplates();
  renderSpread();
  if (!document.getElementById('props-panel').classList.contains('hidden')) abrirPropsSpread();
}

// ── Adicionar / remover spreads ───────────────────────────────────────────────
async function adicionarSpread() {
  // Insere antes da contracapa
  var posContracapa = estado.spreads.findIndex(function(s) { return s.tipo === 'contracapa'; });
  var novaPos = posContracapa >= 0 ? posContracapa : estado.spreads.length;

  // Atualiza posições dos spreads seguintes
  for (var i = novaPos; i < estado.spreads.length; i++) {
    await _sb.from('album_spreads').update({ posicao: i + 1 }).eq('id', estado.spreads[i].id).eq('user_id', _userId);
    estado.spreads[i].posicao = i + 1;
  }

  var tplId = 'duas-lado';
  var { data: spread } = await _sb.from('album_spreads').insert({
    album_id: estado.album.id, user_id: _userId, posicao: novaPos,
    tipo: 'spread', template_id: tplId
  }).select().single();

  if (!spread) return;
  var tpl = TEMPLATES.find(function(t) { return t.id === tplId; });
  var slotsData = tpl.slots.map(function(_, idx) { return { spread_id: spread.id, user_id: _userId, slot_index: idx }; });
  var { data: slots } = await _sb.from('album_slots').insert(slotsData).select();
  spread.album_slots = slots || [];
  estado.spreads.splice(novaPos, 0, spread);
  estado.spreadAtivo = novaPos;

  renderThumbs();
  renderTemplates();
  renderSpread();
}

var _thumbDragIdx = null;

async function reordenarSpreads(deIdx, paraIdx) {
  // Capa (0) e contracapa (último) nunca se movem
  var ultimo = estado.spreads.length - 1;
  if (deIdx === 0 || deIdx === ultimo) return;
  if (paraIdx === 0 || paraIdx === ultimo) return;
  if (deIdx === paraIdx) return;

  var spreads = estado.spreads.slice();
  var [movido] = spreads.splice(deIdx, 1);
  spreads.splice(paraIdx, 0, movido);
  estado.spreads = spreads;

  // Atualiza spreadAtivo para seguir o spread movido
  if (estado.spreadAtivo === deIdx) estado.spreadAtivo = paraIdx;
  else if (deIdx < estado.spreadAtivo && paraIdx >= estado.spreadAtivo) estado.spreadAtivo--;
  else if (deIdx > estado.spreadAtivo && paraIdx <= estado.spreadAtivo) estado.spreadAtivo++;

  // Persiste posições no Supabase em paralelo
  var updates = estado.spreads.map(function(s, i) {
    s.posicao = i;
    return _sb.from('album_spreads').update({ posicao: i }).eq('id', s.id).eq('user_id', _userId);
  });
  await Promise.all(updates);

  renderThumbs();
  renderSpread();
}

async function removerSpread(spreadId) {
  var idx = estado.spreads.findIndex(function(s) { return s.id === spreadId; });
  if (idx < 0) return;
  if (estado.spreads[idx].tipo !== 'spread') return;

  await _sb.from('album_spreads').delete().eq('id', spreadId).eq('user_id', _userId);
  estado.spreads.splice(idx, 1);
  if (estado.spreadAtivo >= estado.spreads.length) estado.spreadAtivo = Math.max(0, estado.spreads.length - 1);

  renderThumbs();
  renderTemplates();
  renderSpread();
}

// ── Atualizar pool visual após mudanças ──────────────────────────────────────
function atualizarUsadasNoPool() {
  document.querySelectorAll('.pool-foto').forEach(function(el) {
    var key = el.dataset.key;
    if (key) { if (estado.fotosUsadas.has(key)) el.classList.add('usada'); else el.classList.remove('usada'); }
  });
}

// ── Nível 4 — Histórico (desfazer/refazer) ───────────────────────────────────
var historico = {
  pilha:  [],
  refeita: [],
  limite: 50,
  empurrar: function(tipo, antes, depois) {
    this.pilha.push({ tipo: tipo, antes: antes, depois: depois });
    if (this.pilha.length > this.limite) this.pilha.shift();
    this.refeita = [];
    atualizarBotoesHistorico();
  },
  desfazer: async function() {
    if (!this.pilha.length) return;
    var entrada = this.pilha.pop();
    this.refeita.push(entrada);
    await restaurarEstadoHistorico(entrada.antes);
    atualizarBotoesHistorico();
  },
  refazer: async function() {
    if (!this.refeita.length) return;
    var entrada = this.refeita.pop();
    this.pilha.push(entrada);
    await restaurarEstadoHistorico(entrada.depois);
    atualizarBotoesHistorico();
  }
};

function atualizarBotoesHistorico() {
  var u = document.getElementById('btn-undo');
  var r = document.getElementById('btn-redo');
  if (u) { if (historico.pilha.length) u.classList.add('ativo'); else u.classList.remove('ativo'); }
  if (r) { if (historico.refeita.length) r.classList.add('ativo'); else r.classList.remove('ativo'); }
}

async function restaurarEstadoHistorico(snap) {
  if (!snap) return;
  if (snap.tipo === 'slot') {
    var spread = estado.spreads.find(function(s) { return s.id === snap.spreadId; });
    if (!spread) return;
    var slot = (spread.album_slots || []).find(function(sl) { return sl.id === snap.slotId; });
    if (!slot) return;
    slot.foto_key   = snap.foto_key;
    slot.foto_x     = snap.foto_x;
    slot.foto_y     = snap.foto_y;
    slot.foto_escala = snap.foto_escala;
    await _sb.from('album_slots').update({ foto_key: snap.foto_key, foto_x: snap.foto_x, foto_y: snap.foto_y, foto_escala: snap.foto_escala, atualizado_em: new Date().toISOString() }).eq('id', slot.id).eq('user_id', _userId);
  } else if (snap.tipo === 'spread-bg') {
    var spread = estado.spreads.find(function(s) { return s.id === snap.spreadId; });
    if (!spread) return;
    spread.background_color = snap.background_color;
    spread.margem_px = snap.margem_px;
    spread.gutter_px = snap.gutter_px;
    await _sb.from('album_spreads').update({ background_color: snap.background_color, margem_px: snap.margem_px, gutter_px: snap.gutter_px }).eq('id', snap.spreadId).eq('user_id', _userId);
  } else if (snap.tipo === 'texto') {
    // Re-render basta; dados já estão em snap
    var spread = estado.spreads.find(function(s) { return s.id === snap.spreadId; });
    if (spread) { spread._textos = snap.textos; }
  }
  // Reconstruir fotosUsadas
  estado.fotosUsadas = new Set();
  estado.spreads.forEach(function(s) { (s.album_slots || []).forEach(function(sl) { if (sl.foto_key) estado.fotosUsadas.add(sl.foto_key); }); });
  renderSpread();
  renderThumbs();
  atualizarUsadasNoPool();
  if (document.getElementById('props-panel') && !document.getElementById('props-panel').classList.contains('hidden')) {
    abrirPropsSpread();
  }
}

// ── Nível 4 — Crop interativo ────────────────────────────────────────────────
var _slotEmEdicao = null; // { grupo, slot, dimSlot, imgNode, snapAntes }

function ativarModoEdicaoSlot(grupo, slot, dimSlot) {
  if (_slotEmEdicao) sairModoEdicaoSlot(true);
  var imgNode = grupo.findOne('Image');
  if (!imgNode) return;

  _slotEmEdicao = {
    grupo: grupo, slot: slot, dimSlot: dimSlot, imgNode: imgNode,
    snapAntes: { tipo:'slot', spreadId: estado.spreads[estado.spreadAtivo].id, slotId: slot.id,
      foto_key: slot.foto_key, foto_x: slot.foto_x, foto_y: slot.foto_y, foto_escala: slot.foto_escala }
  };

  // Borda amber no slot
  var bg = grupo.findOne('Rect');
  if (bg) bg.stroke('var(--amber)') && bg.strokeWidth(2);

  imgNode.draggable(true);
  imgNode.dragBoundFunc(function(pos) {
    return limitarDragFoto(pos, imgNode, dimSlot);
  });
  imgNode.on('dragend.crop', function() { salvarCropAtual(); });

  // Scroll para zoom
  _stage.container().addEventListener('wheel', _wheelCropHandler, { passive: false });
  _layer.batchDraw();
}

function _wheelCropHandler(e) {
  if (!_slotEmEdicao) return;
  var pos = _stage.getPointerPosition();
  if (!pos) return;
  var ds = _slotEmEdicao.dimSlot;
  if (pos.x < ds.x || pos.x > ds.x + ds.w || pos.y < ds.y || pos.y > ds.y + ds.h) return;
  e.preventDefault();
  var imgNode = _slotEmEdicao.imgNode;
  var fator = e.deltaY > 0 ? 0.92 : 1.08;
  var escalaMin = escalaMinCover(imgNode, _slotEmEdicao.dimSlot);
  var novaSc = Math.max(escalaMin, Math.min(imgNode.scaleX() * fator, escalaMin * 3));
  imgNode.scaleX(novaSc); imgNode.scaleY(novaSc);
  var posAjust = limitarDragFoto(imgNode.position(), imgNode, _slotEmEdicao.dimSlot);
  imgNode.position(posAjust);
  _layer.batchDraw();
  salvarCropAtual();
}

function escalaMinCover(imgNode, ds) {
  return Math.max(ds.w / imgNode.width(), ds.h / imgNode.height());
}

function limitarDragFoto(pos, imgNode, ds) {
  var sc = imgNode.scaleX();
  var iw = imgNode.width() * sc, ih = imgNode.height() * sc;
  var minX = ds.x + ds.w - iw, maxX = ds.x;
  var minY = ds.y + ds.h - ih, maxY = ds.y;
  return {
    x: Math.max(minX, Math.min(maxX, pos.x)),
    y: Math.max(minY, Math.min(maxY, pos.y))
  };
}

function salvarCropAtual() {
  if (!_slotEmEdicao) return;
  var imgNode = _slotEmEdicao.imgNode;
  var ds = _slotEmEdicao.dimSlot;
  var slot = _slotEmEdicao.slot;
  slot.foto_x     = imgNode.x() - ds.x;
  slot.foto_y     = imgNode.y() - ds.y;
  slot.foto_escala = imgNode.scaleX();
  setSaveStatus('Salvando…');
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function() {
    _sb.from('album_slots').update({ foto_x: slot.foto_x, foto_y: slot.foto_y, foto_escala: slot.foto_escala, atualizado_em: new Date().toISOString() }).eq('id', slot.id).eq('user_id', _userId).then(function() { setSaveStatus('Salvo ✓'); });
  }, 600);
}

function sairModoEdicaoSlot(silencioso) {
  if (!_slotEmEdicao) return;
  var snap = _slotEmEdicao.snapAntes;
  var slot = _slotEmEdicao.slot;
  if (!silencioso) {
    var snapDepois = { tipo:'slot', spreadId: snap.spreadId, slotId: slot.id, foto_key: slot.foto_key, foto_x: slot.foto_x, foto_y: slot.foto_y, foto_escala: slot.foto_escala };
    if (snap.foto_x !== snapDepois.foto_x || snap.foto_y !== snapDepois.foto_y || snap.foto_escala !== snapDepois.foto_escala) {
      historico.empurrar('crop', snap, snapDepois);
    }
  }
  _slotEmEdicao.imgNode.off('dragend.crop');
  _slotEmEdicao.imgNode.draggable(false);
  _stage.container().removeEventListener('wheel', _wheelCropHandler);
  _slotEmEdicao = null;
  renderSpread();
}

// ── Nível 4 — Aplicar espaçamento (margem + gutter) nos slots ────────────────
function aplicarEspacamento(slots, margemPx, gutterPx, W, H) {
  var mx = margemPx / W, my = margemPx / H;
  var gx = (gutterPx / 2) / W, gy = (gutterPx / 2) / H;
  return slots.map(function(s) {
    var leftEdge = s.x < 0.01;
    var topEdge  = s.y < 0.01;
    var rightEdge  = (s.x + s.w) > 0.99;
    var bottomEdge = (s.y + s.h) > 0.99;
    return {
      x: s.x + mx + (!leftEdge ? gx : 0),
      y: s.y + my + (!topEdge ? gy : 0),
      w: s.w - mx * 2 - (!leftEdge ? gx : 0) - (!rightEdge ? gx : 0),
      h: s.h - my * 2 - (!topEdge ? gy : 0) - (!bottomEdge ? gy : 0),
    };
  });
}

// ── Nível 4 — Atalhos de teclado ─────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  var ctrl = e.ctrlKey || e.metaKey;
  if (ctrl && e.key === 'z' && !e.shiftKey) { e.preventDefault(); historico.desfazer(); return; }
  if ((ctrl && e.key === 'y') || (ctrl && e.shiftKey && e.key === 'z')) { e.preventDefault(); historico.refazer(); return; }
  if (e.key === 'Escape') { sairModoEdicaoSlot(false); }
});

// ── Nível 3 — Auto-layout ────────────────────────────────────────────────────

// Resultado pendente do algoritmo (aplicado só ao aceitar)
var _autoLayoutResultado = null;

// Extrai timestamp do nome do arquivo para ordenação cronológica
// Padrão real: {userId}/{galeriaSlug}/{timestamp}__{seq}.jpg
function extrairSequencia(key) {
  var nome = key.split('/').pop();
  var match = nome.match(/^(\d+)/);
  return match ? parseInt(match[1]) : 0;
}

// Classificação de orientação da foto
function orientacaoFoto(foto) {
  if (!foto.w || !foto.h) return 'quadrado';
  var r = foto.w / foto.h;
  if (r > 1.2) return 'paisagem';
  if (r < 0.85) return 'retrato';
  return 'quadrado';
}

// Escolhe template para um spread dado as próximas fotos disponíveis
function escolherTemplate(fotos, posNoAlbum, tplAnterior, tplAnteAnterior) {
  var ors = fotos.slice(0, 4).map(orientacaoFoto);
  var podeUsar = function(tid) { return !(tid === tplAnterior && tid === tplAnteAnterior); };

  // A cada 5 spreads, full-bleed para respiração narrativa
  if (posNoAlbum > 0 && posNoAlbum % 5 === 4 && fotos.length >= 1 && podeUsar('full-bleed')) {
    return { template_id: 'full-bleed', consumir: 1 };
  }

  var o1 = ors[0], o2 = ors[1], o3 = ors[2];

  // Duas paisagens ou dois retratos → lado a lado
  if (o1 && o2 && (o1 === o2) && podeUsar('duas-lado')) {
    return { template_id: 'duas-lado', consumir: 2 };
  }
  // Misto → grande + duas (ou duas + grande alternando)
  if (o1 && o2 && o3) {
    var tpl = (posNoAlbum % 2 === 0) ? 'tres-direita' : 'tres-esquerda';
    if (podeUsar(tpl)) return { template_id: tpl, consumir: 3 };
  }
  // Quatro fotos em grade quando disponível
  if (fotos.length >= 4 && podeUsar('quatro-grid')) {
    return { template_id: 'quatro-grid', consumir: 4 };
  }
  // Panorama
  if (o1 === 'paisagem' && o2 && podeUsar('panorama')) {
    return { template_id: 'panorama', consumir: 2 };
  }
  // Fallback: uma foto
  return { template_id: 'uma-foto', consumir: 1 };
}

// Loop principal do algoritmo
function autoLayoutAlgoritmo(fotos, numSpreads, opcoes) {
  var pool = opcoes.cronologico
    ? fotos.slice().sort(function(a, b) { return extrairSequencia(a.key) - extrairSequencia(b.key); })
    : fotos.slice();

  var resultado = [];
  var cursor = 0;
  var tplAnterior = null;
  var tplAnteAnterior = null;

  for (var i = 0; i < numSpreads && cursor < pool.length; i++) {
    var disponiveis = pool.slice(cursor);
    var escolha = escolherTemplate(disponiveis, i, tplAnterior, tplAnteAnterior);
    var fotasDoSpread = pool.slice(cursor, cursor + escolha.consumir);
    resultado.push({ template_id: escolha.template_id, fotos: fotasDoSpread });
    cursor += escolha.consumir;
    tplAnteAnterior = tplAnterior;
    tplAnterior = escolha.template_id;
  }

  // Spreads que sobraram sem foto ficam com template padrão
  while (resultado.length < numSpreads) {
    resultado.push({ template_id: 'uma-foto', fotos: [] });
  }

  return resultado;
}

// Smart crop — calcula melhor posicionamento (cover centrado)
function calcularSmartCrop(fw, fh, sw, sh) {
  if (!fw || !fh) return { escala: 1, ox: 0, oy: 0 };
  var propFoto = fw / fh;
  var propSlot = sw / sh;
  var escala, ox, oy;
  if (propFoto > propSlot) {
    escala = sh / fh;
    ox = -((fw * escala) - sw) / 2;
    oy = 0;
  } else {
    escala = sw / fw;
    oy = -((fh * escala) - sh) / 2;
    ox = 0;
  }
  return { escala: escala, ox: ox, oy: oy };
}

// Mede dimensões de todas as fotos do pool carregando thumbnails
function medirDimensoesPool() {
  var fotos = estado.pool.filter(function(f) { return !f.w; });
  if (!fotos.length) return Promise.resolve();
  return Promise.all(fotos.map(function(foto) {
    return new Promise(function(resolve) {
      var img = new Image();
      img.onload = function() { foto.w = img.naturalWidth; foto.h = img.naturalHeight; resolve(); };
      img.onerror = function() { resolve(); };
      img.src = '/api/gallery-img?key=' + encodeURIComponent(foto.key);
    });
  }));
}

// Identifica spreads com trabalho manual (têm pelo menos 1 foto)
function spreadsComFotos() {
  return estado.spreads
    .filter(function(s) { return s.tipo === 'spread'; })
    .filter(function(s) { return (s.album_slots || []).some(function(sl) { return sl.foto_key; }); });
}

async function abrirModalAutoLayout() {

  if (!spreadsTipo.length) { alert('Adicione spreads ao álbum primeiro.'); return; }
  if (!estado.pool.length) { alert('O pool de fotos está vazio.'); return; }

  document.getElementById('modal-autolayout').classList.add('open');

async function gerarPreviewAutoLayout() {
  var grid = document.getElementById('modal-preview-grid');
  grid.innerHTML = '<div style="padding:1.5rem;color:var(--text-hint);font-size:.75rem;">Analisando fotos…</div>';

  await medirDimensoesPool();

  var cronologico = document.getElementById('opt-cronologico').checked;
  var preservar   = document.getElementById('opt-preservar').checked;

  var manuaisIds  = new Set(spreadsComFotos().map(function(s) { return s.id; }));
  var spreadsAlvo = estado.spreads.filter(function(s) {
    return s.tipo === 'spread' && (!preservar || !manuaisIds.has(s.id));
  });

  var fotosDisponiveis = estado.pool.filter(function(f) {
    return !preservar || !estado.fotosUsadas.has(f.key);
  });

  if (!fotosDisponiveis.length) {
    grid.innerHTML = '<div style="padding:1.5rem;color:var(--text-hint);font-size:.75rem;">Todos os spreads já têm fotos. Desmarque "Preservar spreads" para remontar tudo.</div>';
    _autoLayoutResultado = null;
    return;
  }

  _autoLayoutResultado = {
    spreadsAlvo: spreadsAlvo,
    resultado: autoLayoutAlgoritmo(fotosDisponiveis, spreadsAlvo.length, { cronologico: cronologico }),
    preservar: preservar,
    manuaisIds: manuaisIds,
  };

  // Renderizar miniaturas de preview
  grid.innerHTML = '';
  _autoLayoutResultado.resultado.forEach(function(item, i) {
    var wrap = document.createElement('div');
    wrap.className = 'modal-spread-item';

    var cnv = document.createElement('canvas');
    cnv.width = 280; cnv.height = 100;
    cnv.style.width = '100%'; cnv.style.display = 'block';
    wrap.appendChild(cnv);

    var label = document.createElement('div');
    label.className = 'modal-spread-label';
    var tplObj = TEMPLATES.find(function(t) { return t.id === item.template_id; });
    label.textContent = (tplObj ? tplObj.nome : item.template_id) + ' · ' + item.fotos.length + ' foto' + (item.fotos.length !== 1 ? 's' : '');
    wrap.appendChild(label);

    grid.appendChild(wrap);

    // Desenhar miniatura
    renderizarMiniaturaMod(cnv, item);
  });
}

function renderizarMiniaturaMod(cnv, item) {
  var ctx = cnv.getContext('2d');
  var W = cnv.width, H = cnv.height;
  ctx.fillStyle = '#1A1814';
  ctx.fillRect(0, 0, W, H);

  var tpl = TEMPLATES.find(function(t) { return t.id === item.template_id; });
  if (!tpl) return;

  tpl.slots.forEach(function(s, i) {
    var foto = item.fotos[i];
    var sx = s.x * W, sy = s.y * H, sw = s.w * W, sh = s.h * H;
    if (foto) {
      var img = new Image();
      img.onload = function() {
        ctx.save();
        ctx.beginPath();
        ctx.rect(sx, sy, sw, sh);
        ctx.clip();
        var sc = Math.max(sw / img.naturalWidth, sh / img.naturalHeight);
        var dw = img.naturalWidth * sc, dh = img.naturalHeight * sc;
        ctx.drawImage(img, sx + (sw - dw) / 2, sy + (sh - dh) / 2, dw, dh);
        ctx.restore();
      };
      img.src = '/api/gallery-img?key=' + encodeURIComponent(foto.key);
    } else {
      ctx.fillStyle = '#2a2620';
      ctx.fillRect(sx, sy, sw, sh);
    }
  });
}

async function tentarNovamente() {
  // Embaralha levemente para gerar variação
  estado.pool.sort(function() { return Math.random() - 0.5; });
  await gerarPreviewAutoLayout();
}

// Aplica o resultado do auto-layout nos spreads
async function aplicarAutoLayout() {
  if (!_autoLayoutResultado) return;
  var btn = document.querySelector('.modal-footer .btn:last-child');
  if (btn) { btn.textContent = 'Aplicando…'; btn.disabled = true; }

  var { spreadsAlvo, resultado } = _autoLayoutResultado;

  for (var i = 0; i < spreadsAlvo.length && i < resultado.length; i++) {
    var spread = spreadsAlvo[i];
    var item   = resultado[i];
    var tpl    = TEMPLATES.find(function(t) { return t.id === item.template_id; });
    if (!tpl) continue;

    // Atualiza template_id no spread (estado + Supabase)
    spread.template_id = item.template_id;
    await _sb.from('album_spreads').update({ template_id: item.template_id }).eq('id', spread.id).eq('user_id', _userId);

    // Garante slots suficientes no estado
    while ((spread.album_slots || []).length < tpl.slots.length) {
      var novoSlot = { spread_id: spread.id, user_id: _userId, slot_index: spread.album_slots.length, foto_key: null, foto_x: 0, foto_y: 0, foto_escala: 1 };
      var { data: slotCriado } = await _sb.from('album_slots').insert(novoSlot).select().single();
      if (slotCriado) spread.album_slots.push(slotCriado);
    }

    // Coloca fotos nos slots com smart crop
    for (var j = 0; j < tpl.slots.length; j++) {
      var foto = item.fotos[j] || null;
      var slot = spread.album_slots[j];
      if (!slot) continue;

      var s    = tpl.slots[j];
      var slotW = s.w * _dimSpread.w;
      var slotH = s.h * _dimSpread.h;
      var crop  = foto ? calcularSmartCrop(foto.w || slotW, foto.h || slotH, slotW, slotH) : { escala: 1, ox: 0, oy: 0 };

      slot.foto_key   = foto ? foto.key : null;
      slot.foto_x     = crop.ox;
      slot.foto_y     = crop.oy;
      slot.foto_escala = crop.escala;

      if (foto) estado.fotosUsadas.add(foto.key);

      await _sb.from('album_slots').update({
        foto_key: slot.foto_key, foto_x: slot.foto_x, foto_y: slot.foto_y, foto_escala: slot.foto_escala, atualizado_em: new Date().toISOString()
      }).eq('id', slot.id).eq('user_id', _userId);
    }
  }

  fecharModalAutoLayout();
  setSaveStatus('Salvo ✓');
  renderThumbs();
  renderTemplates();
  renderSpread();
}

// ── Utilitários ───────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
