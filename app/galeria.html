<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Galeria</title>
<meta name="description" content="Galeria de fotos">
<meta property="og:title" content="Galeria">
<meta property="og:description" content="Galeria de fotos">
<meta property="og:image" content="">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Galeria">
<meta name="twitter:image" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Raleway:wght@100;200;300;400;500&family=Playfair+Display+SC:wght@400;700&family=Tenor+Sans&family=Oswald:wght@400;600;700&family=Antic+Didone&family=Inter:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  background:var(--gal-bg,#0C0C0C);
  color:var(--gal-text,#EDE9E3);
  font-family:var(--gal-font-body,'DM Sans',sans-serif);
  font-weight:var(--gal-body-weight,400);
  min-height:100vh;
}
#app-root{min-height:100vh;}

/* ============ CAPA ============ */
.capa{position:relative;}
.gal-studio{
  font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gal-accent);margin-bottom:.85rem;font-weight:400;
}
.gal-titulo{
  font-family:var(--gal-font-title,'Playfair Display',serif);
  font-weight:var(--gal-title-weight,600);
  font-style:var(--gal-title-style,normal);
  font-size:2.4rem;line-height:1.15;
  letter-spacing:var(--gal-title-ls,0);
  text-transform:var(--gal-title-tt,none);
}
.gal-subtitulo{
  font-size:.72rem;color:var(--gal-accent);
  margin-top:.75rem;letter-spacing:.08em;text-transform:uppercase;
}

/* Capa FULL */
.capa-full{position:relative;width:100%;height:100vh;overflow:hidden;}
.capa-full img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
}
.capa-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.08) 0%,rgba(0,0,0,.4) 100%);
}
.capa-conteudo-centro{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;color:#fff;padding:2rem;
}
.capa-conteudo-centro .gal-titulo{
  text-shadow:0 2px 12px rgba(0,0,0,.4);font-size:3rem;
}
.capa-conteudo-centro .gal-studio,
.capa-conteudo-centro .gal-subtitulo{color:rgba(255,255,255,.85);}
.capa-scroll-hint{
  position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.55);pointer-events:none;
  animation:scrollBounce 2.4s ease-in-out infinite;
}
@keyframes scrollBounce{
  0%,100%{transform:translateX(-50%) translateY(0);}
  50%{transform:translateX(-50%) translateY(6px);}
}

/* Capa SPLIT */
.capa-split{
  display:grid;grid-template-columns:55% 45%;min-height:60vh;
}
.capa-split-img{overflow:hidden;}
.capa-split-img img{width:100%;height:100%;object-fit:cover;display:block;}
.capa-split-texto{
  display:flex;flex-direction:column;justify-content:center;padding:3rem 2.5rem;
}
.capa-split-texto .gal-titulo{font-size:2.4rem;}

/* Capa CLÁSSICO */
.capa-classico{padding:3rem 2rem 2.5rem;text-align:center;}
.capa-classico-img{
  max-width:65%;margin:0 auto 2rem;aspect-ratio:3/2;overflow:hidden;
}
.capa-classico-img img{width:100%;height:100%;object-fit:cover;display:block;}
.capa-classico .gal-titulo{font-size:2.4rem;}

/* Capa DIVIDIDO */
.capa-dividido{display:grid;grid-template-columns:55% 45%;min-height:60vh;}
.capa-dividido-img{overflow:hidden;}
.capa-dividido-img img{width:100%;height:100%;object-fit:cover;display:block;}
.capa-dividido-texto{display:flex;flex-direction:column;justify-content:center;padding:3rem 2.5rem;}
.capa-dividido-texto .gal-titulo{font-size:2.6rem;line-height:1.05;}
.capa-dividido-linha{width:36px;height:.5px;background:var(--gal-accent);margin:1rem 0;}

/* Capa RETRATO */
.capa-retrato{min-height:100vh;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;}
.capa-retrato-img{height:55vh;overflow:hidden;margin-bottom:1.5rem;}
.capa-retrato-img img{height:100%;width:auto;display:block;object-fit:cover;}
.capa-retrato-linha{width:28px;height:2px;background:var(--gal-accent);margin:0 auto 1.2rem;opacity:.7;}
.capa-retrato .gal-titulo{font-size:2.4rem;}

/* Capa HORIZONTE */
.capa-horizonte{}
.capa-horizonte-banner{width:100%;aspect-ratio:21/9;overflow:hidden;position:relative;}
.capa-horizonte-banner img{width:100%;height:100%;object-fit:cover;display:block;}
.capa-horizonte-texto{padding:2.5rem 2rem 2rem;text-align:center;}
.capa-horizonte-texto .gal-titulo{font-size:2.8rem;}
.capa-horizonte-linha{width:40px;height:.5px;background:var(--gal-accent);margin:1.2rem auto;}

/* ============ SUB-NAV ============ */
.gal-subnav{
  padding:1.7rem 2rem .5rem;
  display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;
}
.gal-subgal-pill{
  font-size:.72rem;padding:0;border:none;border-radius:0;
  background:transparent;color:var(--gal-text);opacity:.4;cursor:pointer;
  transition:opacity .15s;font-family:inherit;letter-spacing:.06em;text-transform:uppercase;
}
.gal-subgal-pill:hover{opacity:.7;}
.gal-subgal-pill.active{opacity:1;}

/* ============ GRIDS ============ */
.gal-grid{padding:1.2rem 1.2rem 4rem;}

/* Grade UNIFORME */
.grade-uniforme{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
}
.grade-uniforme .gal-foto-wrap{aspect-ratio:1;}
.grade-uniforme .gal-foto-wrap img{width:100%;height:100%;object-fit:cover;}
.grade-uniforme .gal-skeleton{aspect-ratio:1;}

/* Grade ORGÂNICA (masonry) — colunas JS via flex */
.grade-masonry{display:flex;gap:6px;align-items:flex-start;}
.grade-masonry .masonry-col{flex:1;display:flex;flex-direction:column;gap:6px;}
.grade-masonry .gal-foto-wrap img{width:100%;display:block;}

/* Grade EDITORIAL */
.grade-editorial{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;grid-auto-flow:dense;
}
.grade-editorial .gal-foto-wrap{aspect-ratio:1;}
.grade-editorial .foto-destaque{grid-column:span 2;grid-row:span 2;}
.grade-editorial .gal-foto-wrap img{width:100%;height:100%;object-fit:cover;}
.grade-editorial .gal-skeleton{aspect-ratio:1;}

/* ============ FOTO COMUM ============ */
.gal-foto-wrap{
  position:relative;overflow:hidden;border-radius:3px;cursor:pointer;
}
.gal-foto-wrap img{transition:transform .4s ease;}
.gal-foto-wrap:hover img{transform:scale(1.025);}
.gal-foto-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 55%,rgba(0,0,0,.35) 100%);
  opacity:0;transition:opacity .25s;
  display:flex;align-items:flex-end;justify-content:flex-end;padding:.55rem;
}
.gal-foto-wrap:hover .gal-foto-overlay{opacity:1;}

/* Responsivo grids */
@media(max-width:900px){
  .grade-uniforme,.grade-editorial{grid-template-columns:repeat(3,1fr);}
  .capa-split{grid-template-columns:1fr;}
  .capa-split-img{aspect-ratio:16/10;}
  .capa-conteudo-centro .gal-titulo{font-size:2.4rem;}
  .capa-classico-img{max-width:90%;}
}
@media(max-width:600px){
  .grade-uniforme,.grade-editorial{grid-template-columns:repeat(2,1fr);gap:4px;}
  .grade-masonry{gap:4px;}
  .gal-grid{padding:.75rem .75rem 3rem;}
  .gal-titulo{font-size:1.7rem;}
  .capa-conteudo-centro .gal-titulo{font-size:2rem;}
  .capa-sem .gal-titulo{font-size:2.2rem;}
}

/* ============ MODAL DOWNLOAD GALERIA ============ */
.gal-dl-btn{background:none;border:none;cursor:pointer;color:var(--gal-text);opacity:.45;transition:opacity .15s;padding:0;display:flex;align-items:center;}
.gal-dl-btn:hover{opacity:1;}
.gal-dl-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;display:none;align-items:center;justify-content:center;}
.gal-dl-modal-overlay.open{display:flex;}
.gal-dl-modal{background:var(--gal-bg);border:.5px solid rgba(255,255,255,.1);border-radius:16px;padding:2rem 2rem 1.6rem;width:92%;max-width:380px;font-family:var(--gal-font-body,'DM Sans',sans-serif);}
.gal-dl-modal-title{font-family:var(--gal-font-title,'Playfair Display',serif);font-size:1.1rem;color:var(--gal-text);margin-bottom:.35rem;font-weight:400;}
.gal-dl-modal-sub{font-size:.72rem;color:var(--gal-text);opacity:.45;margin-bottom:1.5rem;line-height:1.5;}
.gal-dl-modal-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:1.4rem;}
.gal-dl-opt{display:flex;align-items:center;gap:14px;padding:14px 16px;border:.5px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer;text-decoration:none;color:var(--gal-text);transition:background .15s;}
.gal-dl-opt:hover{background:rgba(255,255,255,.05);}
.gal-dl-opt-icon{opacity:.5;flex-shrink:0;}
.gal-dl-opt-info{}
.gal-dl-opt-name{font-size:.8rem;font-weight:500;margin-bottom:2px;}
.gal-dl-opt-desc{font-size:.67rem;opacity:.45;line-height:1.4;}
.gal-dl-modal-cancel{width:100%;padding:9px;background:none;border:.5px solid rgba(255,255,255,.1);border-radius:8px;color:var(--gal-text);opacity:.45;font-size:.75rem;font-family:inherit;cursor:pointer;transition:opacity .15s;}
.gal-dl-modal-cancel:hover{opacity:.8;}

/* Botão download na foto */
.btn-dl-wrap{position:relative;}
.btn-dl-foto{display:flex;align-items:center;justify-content:center;width:30px;height:30px;background:transparent;border:none;border-radius:50%;color:#fff;cursor:pointer;opacity:0;transition:opacity .2s,transform .2s;transform:translateY(4px);}
.gal-foto-wrap:hover .btn-dl-foto{opacity:.75;transform:translateY(0);}
.btn-dl-foto:hover{opacity:1!important;}
.dl-menu{position:absolute;bottom:36px;right:0;background:var(--gal-bg);border:.5px solid var(--gal-border,rgba(128,128,128,.18));border-radius:10px;padding:4px 0;min-width:178px;display:none;z-index:10;box-shadow:0 8px 32px rgba(0,0,0,.35);}
.dl-menu.open{display:block;}
.dl-opt{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:.73rem;color:var(--gal-text);opacity:.7;cursor:pointer;text-decoration:none;white-space:nowrap;transition:background .12s;}
.dl-opt:hover{background:var(--gal-accent-soft,rgba(128,128,128,.08));opacity:1;}
.dl-opt-label{display:flex;flex-direction:column;gap:1px;}
.dl-opt-sub{font-size:.63rem;color:var(--gal-text);opacity:.4;}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:1000;display:none;align-items:center;justify-content:center;}
.lb.open{display:flex;}
.lb-img{max-width:90vw;max-height:90vh;object-fit:contain;}
.lb-close{position:fixed;top:1.1rem;right:1.4rem;background:none;border:none;color:rgba(255,255,255,.35);font-size:1.4rem;cursor:pointer;line-height:1;padding:.4rem;transition:color .15s;}
.lb-close:hover{color:#fff;}
.lb-nav{position:fixed;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.25);cursor:pointer;font-size:2rem;padding:.5rem 1rem;transition:color .15s;line-height:1;}
.lb-nav:hover{color:rgba(255,255,255,.8);}
.lb-prev{left:.5rem;}
.lb-next{right:.5rem;}
.lb-actions{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%);display:flex;gap:8px;}
.lb-dl-btn{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.12);border-radius:8px;padding:8px 16px;color:rgba(255,255,255,.55);font-size:.73rem;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap;}
.lb-dl-btn:hover{background:rgba(255,255,255,.13);color:#fff;border-color:rgba(255,255,255,.25);}

/* Senha gate */
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;padding:2rem;background:var(--gal-bg);}
.gate-box{border:.5px solid var(--gal-accent);border-radius:16px;padding:2.8rem 2.5rem;max-width:360px;width:100%;text-align:center;}
.gate-studio{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gal-accent);margin-bottom:1.5rem;}
.gate-title{font-family:var(--gal-font-title,'Playfair Display',serif);font-weight:var(--gal-title-weight,400);font-size:1.35rem;margin-bottom:.4rem;color:var(--gal-text);}
.gate-sub{font-size:.76rem;color:var(--gal-accent);margin-bottom:1.8rem;line-height:1.5;}
.gate-input{width:100%;padding:11px 14px;background:transparent;border:.5px solid var(--gal-accent);border-radius:8px;color:var(--gal-text);font-size:.85rem;font-family:inherit;margin-bottom:.65rem;outline:none;text-align:center;letter-spacing:.1em;transition:border-color .15s;}
.gate-input:focus{border-color:var(--gal-text);}
.gate-btn{width:100%;padding:11px;background:var(--gal-text);border:none;border-radius:8px;color:var(--gal-bg);font-size:.85rem;font-family:inherit;font-weight:500;cursor:pointer;transition:opacity .15s;letter-spacing:.02em;}
.gate-btn:hover{opacity:.85;}
.gate-error{font-size:.73rem;color:#CC4A28;margin-top:.5rem;}

/* Footer */
.gal-footer{text-align:center;padding:2.5rem 2rem;}
.gal-footer-logo{font-family:var(--gal-font-title,'Playfair Display',serif);font-size:.85rem;color:var(--gal-accent);letter-spacing:.08em;margin-bottom:.4rem;}
.gal-footer-sub{font-size:.6rem;color:var(--gal-accent);opacity:.6;letter-spacing:.12em;text-transform:uppercase;}

/* Empty */
.gal-empty{text-align:center;padding:5rem 2rem;color:var(--gal-accent);font-size:.8rem;grid-column:1/-1;}

/* Lightbox contador */
.lb-counter{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);font-size:.68rem;color:rgba(255,255,255,.25);letter-spacing:.1em;font-family:'DM Sans',sans-serif;pointer-events:none;}

/* Skeleton */
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.gal-skeleton{background:var(--gal-accent);opacity:.15;animation:shimmer 1.8s infinite linear;border-radius:3px;break-inside:avoid;margin-bottom:.6rem;}
.grade-uniforme .gal-skeleton,.grade-editorial .gal-skeleton{margin-bottom:0;}

/* Fade-in nas fotos */
.gal-foto-wrap{opacity:0;transition:opacity .5s ease;}
.gal-foto-wrap.loaded{opacity:1;}

/* ============ FAVORITOS ============ */
/* Botão "favoritas" no subnav (topo) */
.gal-fav-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--gal-text);opacity:.45;transition:opacity .15s;padding:0;font-family:inherit;}
.gal-fav-btn:hover{opacity:1;}
.gal-fav-btn svg{fill:none;stroke:currentColor;stroke-width:2;}
.gal-fav-count{font-size:.62rem;background:var(--gal-text);color:var(--gal-bg);border-radius:10px;padding:1px 6px;min-width:16px;text-align:center;line-height:1.5;}

/* Coração em cada foto — fica fora do overlay p/ favorito aparecer sempre */
.btn-fav-foto{position:absolute;top:.5rem;right:.5rem;z-index:3;width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;cursor:pointer;color:#fff;opacity:0;transition:opacity .2s;padding:0;}
.btn-fav-foto svg{fill:none;stroke:#fff;stroke-width:2;width:17px;height:17px;}
.gal-foto-wrap:hover .btn-fav-foto{opacity:.85;}
.btn-fav-foto:hover{opacity:1!important;}
.btn-fav-foto.ativo{opacity:1;}
.btn-fav-foto.ativo svg{fill:#fff;stroke:#fff;}
/* Touch (sem hover): coração sempre visível p/ ser tocável */
@media(hover:none){ .btn-fav-foto{opacity:.7;} }

/* Modal de email */
.fav-email-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:10000;align-items:center;justify-content:center;padding:1.5rem;}
.fav-email-modal.open{display:flex;}
.fav-email-box{background:var(--gal-bg);border:.5px solid var(--gal-accent);border-radius:14px;padding:2.5rem 2rem;max-width:380px;width:100%;text-align:center;}
.fav-email-icon{font-size:2rem;color:var(--gal-text);opacity:.6;margin-bottom:1rem;}
.fav-email-titulo{font-family:var(--gal-font-title,'Playfair Display',serif);font-weight:var(--gal-title-weight,600);font-size:1.2rem;color:var(--gal-text);margin-bottom:.5rem;}
.fav-email-sub{font-size:.78rem;color:var(--gal-accent);line-height:1.6;margin-bottom:1.5rem;}
.fav-email-input{width:100%;padding:11px 14px;border-radius:8px;border:.5px solid var(--gal-accent);background:transparent;color:var(--gal-text);font-family:inherit;font-size:.88rem;outline:none;margin-bottom:.75rem;text-align:center;}
.fav-email-input:focus{border-color:var(--gal-text);}
.fav-email-btn{width:100%;padding:11px;border-radius:8px;background:var(--gal-text);color:var(--gal-bg);border:none;font-family:inherit;font-size:.85rem;font-weight:500;cursor:pointer;margin-bottom:.5rem;}
.fav-email-cancel{width:100%;padding:8px;background:transparent;border:none;color:var(--gal-accent);font-family:inherit;font-size:.75rem;cursor:pointer;}
.fav-email-erro{font-size:.72rem;color:#CC4A28;margin-top:.5rem;min-height:1rem;}

/* View de favoritas */
.fav-view-header{text-align:center;padding:3rem 1.5rem 1.5rem;}
.fav-view-voltar{background:transparent;border:none;color:var(--gal-accent);font-family:inherit;font-size:.75rem;cursor:pointer;margin-bottom:1.2rem;letter-spacing:.04em;}
.fav-view-voltar:hover{color:var(--gal-text);}
.fav-view-titulo{font-family:var(--gal-font-title,'Playfair Display',serif);font-weight:var(--gal-title-weight,600);font-size:1.8rem;color:var(--gal-text);}
.fav-view-sub{font-size:.75rem;color:var(--gal-accent);margin-top:.4rem;}
.fav-view-vazio{text-align:center;padding:4rem 2rem;color:var(--gal-text);opacity:.7;font-size:.85rem;}

/* Toast */
.gal-toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--gal-text);color:var(--gal-bg);padding:10px 20px;border-radius:40px;font-size:.75rem;font-family:var(--gal-font-body,'DM Sans',sans-serif);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:11000;}
.gal-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app-root"></div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="lbClickOutside(event)">
  <img class="lb-img" id="lb-img" src="" alt="">
  <button class="lb-close" onclick="closeLb()">×</button>
  <div class="lb-counter" id="lb-counter"></div>
  <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
  <button class="lb-nav lb-next" onclick="lbNav(1)">›</button>
  <div class="lb-actions" id="lb-actions" style="display:none;">
    <a class="lb-dl-btn" id="lb-dl-web" href="#" onclick="return dlLb('web')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span class="dl-opt-label"><span>Versão web</span><span class="dl-opt-sub">Para redes sociais · 1080px</span></span>
    </a>
    <a class="lb-dl-btn" id="lb-dl-full" href="#" onclick="return dlLb('full')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span class="dl-opt-label"><span>Alta resolução</span><span class="dl-opt-sub">Arquivo original</span></span>
    </a>
  </div>
</div>

<!-- MODAL EMAIL DE FAVORITOS -->
<div class="fav-email-modal" id="fav-email-modal">
  <div class="fav-email-box">
    <div class="fav-email-icon">♡</div>
    <div class="fav-email-titulo">Salve suas fotos favoritas</div>
    <div class="fav-email-sub">Digite seu email para criar sua seleção. Assim você pode voltar depois e continuar de onde parou — de qualquer dispositivo.</div>
    <input type="email" class="fav-email-input" id="fav-email-input" placeholder="seu@email.com" onkeydown="if(event.key==='Enter') confirmarEmailFav()">
    <button class="fav-email-btn" onclick="confirmarEmailFav()">Começar</button>
    <button class="fav-email-cancel" onclick="cancelarEmailModal()">Agora não</button>
    <div class="fav-email-erro" id="fav-email-erro"></div>
  </div>
</div>

<script>

  editorial:'historia', linho:'cai', cinema:'eterno', memorial:'sempre', classico:'casamento', moderno:'detalhe'
};

function resolverDesign(design){
  var d = design || { tema: 'editorial' };
  var tema = TEMAS_GALERIA[d.tema] || TEMAS_GALERIA.editorial;
  var corKey = d.cor || tema.cor_padrao;
  if (!PALETAS_COR[corKey]) corKey = tema.cor_padrao;
  if (!PALETAS_COR[corKey]) corKey = Object.keys(PALETAS_COR)[0];
  var paleta = PALETAS_COR[corKey];
  var tipoKey = d.tipografia || TEMA_TIPOGRAFIA_PADRAO[d.tema || 'editorial'] || 'historia';
  var tipo = TIPOGRAFIAS[tipoKey] || TIPOGRAFIAS.historia;
  return {
    tema:         d.tema || 'editorial',
    tema_obj:     tema,
    cor_key:      corKey,
    paleta:       paleta,
    capa_layout:  d.capa_layout || tema.capa_padrao,
    grade:        'masonry',
    zoom_grid:    (d.zoom_grid && d.zoom_grid <= 6) ? d.zoom_grid : null,
    ponto_focal:  d.ponto_focal || { x: 50, y: 50 },
    tipo_key:     tipoKey,
    tipo:         tipo
  };
}

// Recuperação automática de imagens R2 quebradas (bucket privado).
(function(){
  document.addEventListener('error',function(e){
    if(e.target.tagName!=='IMG'||e.target.dataset.r2tried) return;
    var src=e.target.getAttribute('src')||'';
    var m=src.match(/r2\.dev\/([^?]+)/)||src.match(/r2\.cloudflarestorage\.com\/[^/]+\/([^?]+?)(?:\?|$)/);
    if(!m) return;
    e.target.dataset.r2tried='1';
    e.target.src='/api/gallery-img?key='+encodeURIComponent(m[1]);
  },true);
})();

async function carregarFavoritos(){
  if(!_favEmail) return;
  try {
    var resp = await fetch('/api/favoritos?action=get&slug='+encodeURIComponent(_slug)+'&email='+encodeURIComponent(_favEmail));
    var data = await resp.json();
    var listas = (data && data.listas) || {};
    _favIds = listas[_favListaNome] || [];
  } catch(err){ console.error('Erro ao carregar favoritos:', err); _favIds = []; }
}
async function salvarFavoritos(){
  if(!_favEmail) return;
  try {
    await fetch('/api/favoritos', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'save', slug:_slug, email:_favEmail, lista:_favListaNome, foto_ids:_favIds })
    });
  } catch(err){ console.error('Erro ao salvar favoritos:', err); }
}

function _setMeta(prop, val){
  var el = document.querySelector('meta[property="'+prop+'"]');
  if(el) el.setAttribute('content', val);
}

init();

async function init(){
  if(!_slug){ showErro('Galeria não encontrada.'); return; }
  try{
    var r = await fetch('/api/gallery-public?slug='+encodeURIComponent(_slug));
    var data = await r.json();
    if(!data || !data.galeria){ showErro('Galeria não encontrada.'); return; }
    _galData = data.galeria;
    var studio = _galData.nomeEstudio || 'Kelvn';
    var titulo = (_galData.nomeCliente || 'Galeria') + ' — ' + studio;
    var descricao = _galData.dataEvento
      ? 'Galeria de fotos · ' + formatarData(_galData.dataEvento)
      : 'Galeria de fotos';
    var ogImage = _galData.cover_url || '';
    document.title = titulo;
    _setMeta('og:title', titulo);
    _setMeta('og:description', descricao);
    _setMeta('og:image', ogImage);
    _setMeta('twitter:title', titulo);
    _setMeta('twitter:image', ogImage);
    document.querySelector('meta[name="description"]').setAttribute('content', descricao);
    if(_galData.temSenha && !data.fotos){
      showGate();
    } else {
      _todasFotos = data.fotos || _galData.fotos || [];
      _downloads = !!_galData.downloads_liberados;
      renderizarGaleria();
    }
  } catch(e){ showErro('Não foi possível carregar a galeria.'); }
}

async function verificarSenha(){
  var pw = document.getElementById('gate-pw').value;
  if(!pw) return;
  try{
    var r = await fetch('/api/gallery-verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:_slug,senha:pw})});
    var data = await r.json();
    if(data && data.fotos){
      _todasFotos = data.fotos;
      _downloads = !!data.downloads_liberados;
      if(data.subgalerias) _galData.subgalerias = data.subgalerias;
      renderizarGaleria();
    } else {
      document.getElementById('gate-err').style.display='';
    }
  } catch(e){ document.getElementById('gate-err').style.display=''; }
}

function formatarData(str){
  // Aceita dd/mm/aaaa ou aaaa-mm-dd
  var meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  var d, m, a;
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(str)){
    var p = str.split('/'); d=p[0]; m=parseInt(p[1],10); a=p[2];
  } else if(/^\d{4}-\d{2}-\d{2}/.test(str)){
    var p = str.split('-'); d=p[2].slice(0,2); m=parseInt(p[1],10); a=p[0];
  } else { return str; }
  return d + ' de ' + (meses[m-1]||m) + ' de ' + a;
}

function renderCapa(d, coverUrl){
  var titulo  = _galData.nomeCliente || 'Galeria';
  var studio  = _galData.nomeEstudio || '';
  var label   = (studio || 'GALERIA DE CASAMENTO').toUpperCase();
  var dataEv  = _galData.dataEvento ? formatarData(_galData.dataEvento) : '';
  var anoEv   = dataEv ? dataEv.split(' ').pop() : new Date().getFullYear();
  var subInfo = dataEv;
  var pf = d.ponto_focal || { x:50, y:50 };
  var pfStyle = 'object-position:'+pf.x+'% '+pf.y+'%;';

  // Full Editorial — foto preenche tela toda, overlay, label topo, título centro, data
  if(d.capa_layout === 'full'){
    return '<div class="capa capa-full">'
      +(coverUrl?'<img src="'+coverUrl+'" style="'+pfStyle+'" alt="">':'')
      +'<div class="capa-overlay"></div>'
      +'<div class="capa-conteudo capa-conteudo-centro">'
        +'<div class="gal-studio">'+label+'</div>'
        +'<div style="width:36px;height:.5px;background:rgba(255,255,255,.4);margin:0 auto .9rem;"></div>'
        +'<h1 class="gal-titulo">'+titulo+'</h1>'
        +(subInfo?'<div class="gal-subtitulo">'+subInfo+'</div>':'')
      +'</div>'
      +'<div class="capa-scroll-hint"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></div>'
    +'</div>';
  }

  // Dividido — foto esquerda, painel texto direita
  if(d.capa_layout === 'dividido'){
    return '<div class="capa capa-dividido">'
      +'<div class="capa-dividido-img">'+(coverUrl?'<img src="'+coverUrl+'" style="'+pfStyle+'" alt="">':'')+'</div>'
      +'<div class="capa-dividido-texto">'
        +'<div class="gal-studio">GALERIA · '+anoEv+'</div>'
        +'<h1 class="gal-titulo">'+titulo+'</h1>'
        +'<div class="capa-dividido-linha"></div>'
        +(subInfo?'<div class="gal-subtitulo">'+subInfo+'</div>':'')
      +'</div>'
    +'</div>';
  }

  // Retrato Centrado — foto pequena central, linha amber, título abaixo
  if(d.capa_layout === 'retrato'){
    return '<div class="capa capa-retrato">'
      +'<div class="gal-studio">'+label+'</div>'
      +(coverUrl?'<div class="capa-retrato-img"><img src="'+coverUrl+'" style="'+pfStyle+'" alt=""></div>':'')
      +'<div class="capa-retrato-linha"></div>'
      +'<h1 class="gal-titulo">'+titulo+'</h1>'
      +(subInfo?'<div class="gal-subtitulo" style="margin-top:.75rem;">'+subInfo+'</div>':'')
    +'</div>';
  }

  // Horizonte — banner foto no topo, espaço limpo abaixo com título
  return '<div class="capa capa-horizonte">'
    +(coverUrl?'<div class="capa-horizonte-banner"><img src="'+coverUrl+'" style="'+pfStyle+'" alt=""></div>':'')
    +'<div class="capa-horizonte-texto">'
      +'<h1 class="gal-titulo">'+titulo+'</h1>'
      +'<div class="capa-horizonte-linha"></div>'
      +(subInfo?'<div class="gal-subtitulo">'+subInfo+'</div>':'')
    +'</div>'
  +'</div>';
}

function renderSkeletons(n, grade){
  var html = '';
  for(var i=0;i<n;i++){
    if(grade === 'masonry'){
      var h = _skHeights[i % _skHeights.length];
      html += '<div class="gal-skeleton" style="padding-bottom:'+h+'%;"></div>';
    } else {
      // uniforme e editorial usam quadrados (aspect-ratio definido no CSS)
      html += '<div class="gal-skeleton"></div>';
    }
  }
  return html;
}

function renderGridFotos(){
  if(!_fotosVisiveis.length){
    return '<div class="gal-empty">Nenhuma foto nesta seção.</div>';
  }
  var grade = _designResolvido ? _designResolvido.grade : 'masonry';

  // Função auxiliar: célula de foto
  function fotoCell(foto, i, classExtra){
    var imgSrc = foto.webUrl || foto.url;
    var dlBtn = _downloads ? (
      '<div class="btn-dl-wrap" onclick="event.stopPropagation()">'
      +'<button class="btn-dl-foto" onclick="toggleDlMenu(this,'+i+')" title="Download">'
      +'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
      +'</button>'
      +'<div class="dl-menu" id="dl-menu-'+i+'">'
      +renderDlOpts(foto, i)
      +'</div>'
      +'</div>'
    ) : '';
    var favKey = _fotoId(foto);
    var favBtn = '<button class="btn-fav-foto'+(_favIds.indexOf(favKey)>-1?' ativo':'')+'" '
      +'data-fav-key="'+favKey+'" onclick="event.stopPropagation();toggleFavorito(\''+favKey+'\')" title="Favoritar">'
      +_favHeartSvg+'</button>';
    return '<div class="gal-foto-wrap'+(classExtra||'')+'" onclick="openLb('+i+')">'
      +'<img src="'+imgSrc+'" loading="lazy" alt="Foto '+(i+1)+'"'
      +(foto.url !== imgSrc ? ' onerror="this.src=\''+foto.url+'\'"' : '')+'>'
      +favBtn
      +'<div class="gal-foto-overlay">'+dlBtn+'</div>'
      +'</div>';
  }

  if(grade === 'masonry'){
    // Distribui fotos em colunas via JS — sem gaps do CSS column-fill
    var nCols = (_designResolvido && _designResolvido.zoom_grid) ? _designResolvido.zoom_grid : 4;
    var cols = [];
    for(var c=0;c<nCols;c++) cols.push([]);
    _fotosVisiveis.forEach(function(f,i){ cols[i%nCols].push({f:f,i:i}); });
    var html = '';
    cols.forEach(function(col){
      html += '<div class="masonry-col">';
      col.forEach(function(item){ html += fotoCell(item.f, item.i, ''); });
      html += '</div>';
    });
    return html;
  }

  return _fotosVisiveis.map(function(foto, i){
    // Destaque em layout editorial: a cada 7 fotos, índices 0 e 3 são grandes
    var classDestaque = (grade === 'editorial' && (i % 7 === 0 || i % 7 === 3)) ? ' foto-destaque' : '';
    return fotoCell(foto, i, classDestaque);
  }).join('');
}

function renderDlOpts(foto, i){
  var html = '';
  var webSrc = foto.webKey || foto.webUrl;
  var fullSrc = foto.key || foto.url;
  var dlIcon = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
  // Versão web — usa webKey ou webUrl; fallback para fullSrc se nenhum existir
  var webHref = webSrc
    ? '/api/gallery-download?key='+encodeURIComponent(webSrc)+'&filename=web_foto-'+(i+1)+'.jpg'
    : '/api/gallery-download?key='+encodeURIComponent(fullSrc)+'&filename=web_foto-'+(i+1)+'.jpg';
  html += '<a class="dl-opt" href="'+webHref+'" download onclick="event.stopPropagation()">'
    +dlIcon
    +'<div class="dl-opt-label"><span>Versão web</span><span class="dl-opt-sub">Para redes sociais · 1080px</span></div>'
    +'</a>';
  // Alta resolução
  if(fullSrc){
    html += '<a class="dl-opt" href="/api/gallery-download?key='+encodeURIComponent(fullSrc)+'&filename=foto-'+(i+1)+'.jpg" download onclick="event.stopPropagation()">'
      +dlIcon
      +'<div class="dl-opt-label"><span>Alta resolução</span><span class="dl-opt-sub">Arquivo original</span></div>'
      +'</a>';
  }
  return html;
}

function toggleDlMenu(btn, i){
  var menu = document.getElementById('dl-menu-'+i);
  if(!menu) return;
  var isOpen = menu.classList.contains('open');
  // fecha todos
  document.querySelectorAll('.dl-menu.open').forEach(function(m){ m.classList.remove('open'); });
  if(!isOpen) menu.classList.add('open');
}

function filtrarSubgalPublica(subgalId){
  _subgalPublicaAtiva = subgalId;
  document.querySelectorAll('.gal-subgal-pill').forEach(function(b){ b.classList.remove('active'); });
  var pills = document.querySelectorAll('.gal-subgal-pill');
  if(subgalId === null){
    if(pills[0]) pills[0].classList.add('active');
    _fotosVisiveis = _todasFotos.slice();
  } else {
    var subs = _galData.subgalerias || [];
    var sub = subs.find(function(s){ return s.id === subgalId; });
    if(sub){
      Array.from(pills).forEach(function(b){
        if(b.textContent.trim().startsWith(sub.nome)) b.classList.add('active');
      });
    }
    _fotosVisiveis = _todasFotos.filter(function(f){ return f.subgaleriaId === subgalId; });
  }
  var grid = document.getElementById('gal-grid');
  if(grid){
    if(_designResolvido) grid.className = 'gal-grid grade-' + _designResolvido.grade;
    grid.innerHTML = renderGridFotos();
    if(_designResolvido && _designResolvido.zoom_grid && (_designResolvido.grade==='uniforme'||_designResolvido.grade==='editorial')){
      grid.style.gridTemplateColumns='repeat('+_designResolvido.zoom_grid+',1fr)';
    }
    document.querySelectorAll('.gal-foto-wrap img').forEach(function(img){
      var wrap = img.closest('.gal-foto-wrap');
      if(img.complete){ wrap.classList.add('loaded'); }
      else { img.addEventListener('load', function(){ wrap.classList.add('loaded'); }); }
    });
    atualizarCoracoesFotos();
  }
}

// Lightbox
function openLb(i){
  _lbIdx = i;
  atualizarLb();
  document.getElementById('lb').classList.add('open');
}
function closeLb(){
  document.getElementById('lb').classList.remove('open');
}
function lbClickOutside(e){
  if(e.target === document.getElementById('lb')) closeLb();
}
function lbNav(dir){
  _lbIdx = (_lbIdx + dir + _fotosVisiveis.length) % _fotosVisiveis.length;
  atualizarLb();
}
function atualizarLb(){
  var foto = _fotosVisiveis[_lbIdx];
  if(!foto) return;
  document.getElementById('lb-img').src = foto.webUrl || foto.url;
  var counter = document.getElementById('lb-counter');
  if(counter) counter.textContent = (_lbIdx+1) + ' / ' + _fotosVisiveis.length;
  var actionsEl = document.getElementById('lb-actions');
  if(_downloads){
    actionsEl.style.display = '';
    // Versão web
    var webEl = document.getElementById('lb-dl-web');
    if(foto.webKey){
      webEl.href = '/api/gallery-download?key='+encodeURIComponent(foto.webKey)+'&filename=web_foto-'+(_lbIdx+1)+'.jpg';
      webEl.style.display = '';
    } else {
      webEl.style.display = 'none';
    }
    // Alta resolução
    var fullEl = document.getElementById('lb-dl-full');
    if(foto.key){
      fullEl.href = '/api/gallery-download?key='+encodeURIComponent(foto.key)+'&filename=foto-'+(_lbIdx+1)+'.jpg';
      fullEl.style.display = '';
    } else if(foto.url){
      fullEl.href = foto.url;
      fullEl.style.display = '';
    } else {
      fullEl.style.display = 'none';
    }
  } else {
    actionsEl.style.display = 'none';
  }
}
function dlLb(tipo){
  var foto = _fotosVisiveis[_lbIdx];
  if(!foto) return false;
  var key = tipo === 'web' ? foto.webKey : foto.key;
  var fname = tipo === 'web' ? 'web_foto-'+(_lbIdx+1)+'.jpg' : 'foto-'+(_lbIdx+1)+'.jpg';
  if(key){
    window.location.href = '/api/gallery-download?key='+encodeURIComponent(key)+'&filename='+encodeURIComponent(fname);
  } else if(foto.url){
    window.location.href = foto.url;
  }
  return false;
}
document.addEventListener('keydown', function(e){
  if(!document.getElementById('lb').classList.contains('open')) return;
  if(e.key==='ArrowLeft') lbNav(-1);
  if(e.key==='ArrowRight') lbNav(1);
  if(e.key==='Escape') closeLb();
});

// Swipe no mobile
(function(){
  var sx=0, sy=0;
  document.addEventListener('touchstart', function(e){
    if(!document.getElementById('lb').classList.contains('open')) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, {passive:true});
  document.addEventListener('touchend', function(e){
    if(!document.getElementById('lb').classList.contains('open')) return;
    var dx = e.changedTouches[0].clientX - sx;
    var dy = e.changedTouches[0].clientY - sy;
    if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40){
      lbNav(dx < 0 ? 1 : -1);
    }
  }, {passive:true});
})();

function abrirModalDownload(){
  var m = document.getElementById('gal-dl-modal');
  if(m) m.classList.add('open');
}
function fecharModalDownload(){
  var m = document.getElementById('gal-dl-modal');
  if(m) m.classList.remove('open');
}
function iniciarDownloadGaleria(tipo){
  fecharModalDownload();
  var fotos = tipo === 'web'
    ? _todasFotos.filter(function(f){ return f.webKey || f.webUrl; })
    : _todasFotos.filter(function(f){ return f.key || f.url; });
  if(!fotos.length){ alert('Nenhum arquivo disponível para download.'); return; }
  fotos.forEach(function(foto, i){
    setTimeout(function(){
      var key = tipo === 'web' ? (foto.webKey || foto.webUrl) : (foto.key || foto.url);
      var fname = (tipo === 'web' ? 'web_' : '') + 'foto-'+(i+1)+'.jpg';
      var a = document.createElement('a');
      a.href = '/api/gallery-download?key='+encodeURIComponent(key)+'&filename='+encodeURIComponent(fname);
      a.download = fname;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }, i * 200);
  });
}

// ===== FAVORITOS — UI, TOGGLE E VIEW =====
var _favHeartSvg = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';

function abrirEmailModal(){
  document.getElementById('fav-email-modal').classList.add('open');
  setTimeout(function(){ var inp=document.getElementById('fav-email-input'); if(inp) inp.focus(); }, 100);
}
function fecharEmailModal(){ document.getElementById('fav-email-modal').classList.remove('open'); }
function cancelarEmailModal(){ _favPendente=null; fecharEmailModal(); }

async function confirmarEmailFav(){
  var email=(document.getElementById('fav-email-input').value||'').toLowerCase().trim();
  var erroEl=document.getElementById('fav-email-erro');
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ erroEl.textContent='Digite um email válido.'; return; }
  erroEl.textContent='';
  _favEmail=email;
  salvarEmailDevice(email);
  await carregarFavoritos();
  fecharEmailModal();
  atualizarCoracoesFotos();
  atualizarContadorFav();
  // Abre view se foi chamada antes da identificação
  if(_favPendingView){ _favPendingView=false; abrirViewFavoritos(); return; }
  // Aplica intenção pendente (cliente clicou no coração antes de identificar)
  if(_favPendente){ var p=_favPendente; _favPendente=null; await toggleFavorito(p); return; }
  notify('Pronto! Agora é só favoritar.');
}

async function toggleFavorito(fotoKey){
  // Sem email ainda? Guarda a intenção e pede o email primeiro
  if(!_favEmail){ _favPendente=fotoKey; abrirEmailModal(); return; }
  var idx=_favIds.indexOf(fotoKey);
  if(idx>-1) _favIds.splice(idx,1); else _favIds.push(fotoKey);
  // Atualiza UI imediatamente (responsivo), depois persiste
  if(_favViewAtiva){ renderViewFavoritos(); }
  else { atualizarCoracoesFotos(); atualizarContadorFav(); }
  await salvarFavoritos();
}

function atualizarCoracoesFotos(){
  document.querySelectorAll('.btn-fav-foto').forEach(function(btn){
    var k=btn.getAttribute('data-fav-key');
    if(_favIds.indexOf(k)>-1) btn.classList.add('ativo'); else btn.classList.remove('ativo');
  });
}
function atualizarContadorFav(){
  var el=document.getElementById('gal-fav-count');
  if(!el) return;
  if(_favIds.length>0){ el.textContent=_favIds.length; el.style.display=''; }
  else { el.style.display='none'; }
}

async function abrirViewFavoritos(){
  if(!_favEmail){ _favPendingView=true; abrirEmailModal(); return; }
  _favViewAtiva=true;
  renderViewFavoritos();
}
function fecharViewFavoritos(){
  _favViewAtiva=false;
  renderizarGaleria(); // re-renderiza a galeria normal (restaura corações/contador via _initFavoritos)
}
function renderViewFavoritos(){
  var favFotos=_todasFotos.filter(function(f){ return _favIds.indexOf(_fotoId(f))>-1; });
  _fotosVisiveis=favFotos; // lightbox navega só entre as favoritas
  var d=_designResolvido;
  var grade=d?d.grade:'masonry';

  var html='<div class="fav-view-header">'
    +'<button class="fav-view-voltar" onclick="fecharViewFavoritos()">← Voltar à galeria</button>'
    +'<div class="fav-view-titulo">'+_favListaNome+'</div>'
    +'<div class="fav-view-sub">'+favFotos.length+' foto'+(favFotos.length===1?'':'s')+' · '+_favEmail+'</div>'
    +'</div>';

  if(!favFotos.length){
    html+='<div class="fav-view-vazio">'
      +'<div style="font-size:2rem;opacity:.3;margin-bottom:1rem;">♡</div>'
      +'<div>Você ainda não favoritou nenhuma foto.</div>'
      +'<div style="font-size:.75rem;opacity:.6;margin-top:.5rem;">Toque no coração das fotos que você ama para criar sua seleção.</div>'
      +'</div>';
    document.getElementById('app-root').innerHTML=html;
    return;
  }

  html+='<div class="gal-grid grade-'+grade+'" id="gal-grid"></div>';
  document.getElementById('app-root').innerHTML=html;
  var grid=document.getElementById('gal-grid');
  grid.innerHTML=renderGridFotos(); // reaproveita a renderização real (masonry/uniforme/editorial)
  if(d&&d.zoom_grid&&(grade==='uniforme'||grade==='editorial')){ grid.style.gridTemplateColumns='repeat('+d.zoom_grid+',1fr)'; }
  document.querySelectorAll('.gal-foto-wrap img').forEach(function(img){
    var wrap=img.closest('.gal-foto-wrap');
    if(img.complete){ wrap.classList.add('loaded'); }
    else { img.addEventListener('load',function(){ wrap.classList.add('loaded'); }); }
  });
}

async function _initFavoritos(){
  carregarEmailSalvo();
  atualizarContadorFav();
  if(_favEmail){
    await carregarFavoritos();
    atualizarCoracoesFotos();
    atualizarContadorFav();
  }
}

// Toast leve (notify não existe na galeria, diferente do app do fotógrafo)
var _favToastTimer=null;
function notify(msg){
  var t=document.getElementById('gal-toast');
  if(!t){ t=document.createElement('div'); t.id='gal-toast'; t.className='gal-toast'; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_favToastTimer);
  _favToastTimer=setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function showErro(msg){
  document.getElementById('app-root').innerHTML =
    '<div class="gate"><div class="gate-box" style="opacity:.6;">'
    +'<div class="gate-title">Galeria</div>'
    +'<div class="gate-sub">'+msg+'</div>'
    +'</div></div>';
}
</script>
